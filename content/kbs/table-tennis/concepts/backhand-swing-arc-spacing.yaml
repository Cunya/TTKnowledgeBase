id: concept-backhand-swing-arc-spacing
slug: backhand-swing-arc-spacing
label: Creating space for the backhand
aliases: [backhand swing-arc spacing, backhand working room, create space]
short_definition: Adjust body-to-ball distance so the racket has room for a natural backswing and forward arc.
evidence_summary: >-
  Good backhand mechanics depend on creating enough space between the body and the ball, since a
  cramped stroke limits forward acceleration and power. The player should move slightly backward
  and lower the hand to open room, while still bringing the ball into a workable hitting zone that
  is not so close that there is no space to swing. This spacing is managed more by the forearm
  than by the elbow, and it helps the backhand flick and other strokes feel freer and more
  powerful.
evidence_summary_source_hash: "sha256:6f7d812f375e1dc8c49d8eab8cabafa7308a78093112e02833dcc19ebcc51aaa"
evidence_summary_generator: "codex"
detailed_definition: Spacing changes both the available stroke and contact timing. Too close produces a cramped push; roughly a racket or arm's length of working room permits acceleration and gives more timing options.
concept_type: positioning
facets: {category: [backhand, spacing, timing], side: [backhand], level: [beginner, intermediate]}
difficulty: beginner
review_status: approved
