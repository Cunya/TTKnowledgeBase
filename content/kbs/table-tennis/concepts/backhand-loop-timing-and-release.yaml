id: concept-backhand-loop-timing-and-release
slug: backhand-loop-timing-and-release
label: Backhand loop timing and release
aliases:
  - backhand loop rhythm
  - backhand racket-head whip
short_definition: Wait for the ball, preserve working space, and release the racket head around a stable elbow with late acceleration rather than pushing early with the whole arm.
evidence_summary: >-
  Backhand loop timing is late and compact: the backswing begins as the ball crosses the net, and
  contact comes on the descent after the ball has entered the player’s space. Power comes from a
  whip-like release of the racket tip and forearm, while the elbow stays relatively anchored so
  the stroke does not turn into a large whole-arm swing. The motion should finish as a brief brush
  and stop, with the release happening only when the ball is in the correct hitting zone.
