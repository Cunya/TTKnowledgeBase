short_definition: Generating stroke power primarily through coordinated body movement rather than large arm opening alone.
evidence_summary: >-
  Body-led power generation brings together several connected ideas. A useful contrast is between
  limited arm opening and power generated and transmitted through the body, then classifies power
  generation types including combined power. To push off for speed, have the left leg generate
  lateral force, and let the right leg come over afterward. Serve speed can borrow power from the
  body and be powered by the body's braking force. A useful contrast is between arm-only hitting
  and using the body, says power comes from body movement, and links that to explosive loop
  quality. The elbow as a power point and power is not just from the forearm or upper arm, but
  from their combination as one unit. Together, these principles show how the topic is applied in
  practice while preserving the relevant distinctions and constraints.
