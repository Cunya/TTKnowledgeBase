short_definition: Generating stroke power primarily through coordinated body movement rather than large arm opening alone.
evidence_summary: >-
  Body-led power generation brings together several connected ideas. A useful contrast is between
  limited arm opening and power generated and transmitted through the body, then classifies power
  generation types including combined power. Serve speed can borrow power from the body and be
  powered by the body's braking force. The elbow as a power point and power is not just from the
  forearm or upper arm, but from their combination as one unit. Body power after fingers and
  forearm to combine forces and improve shot quality. To use the torso and that correct practice
  yields the right feeling of power coming from the right place. A useful contrast is between body
  action and arm action and gives a power distribution from fingers/wrist, forearm, and upper arm.
  Many mistakes come from the upper arm and shoulder, and that adding body rotation changes
  contact point and can break the stroke, which frames body involvement as of power and errors.
  Power comes from driving the shoulders forward and that body strength is needed, not just the
  hand, wrist, forearm, or upper arm. Additional points reinforce the same theme. Together, these
  principles show how the topic is applied in practice while preserving the relevant distinctions
  and constraints.
