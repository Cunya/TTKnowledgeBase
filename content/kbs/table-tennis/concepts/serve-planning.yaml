id: concept-serve-planning
slug: serve-planning
label: Serve planning
aliases:
  - serve plan by game
  - serve sequence planning
short_definition: Plan serves across a game instead of choosing each one in isolation, preserving effective options for important points.
evidence_summary: >-
  Serve choice should be planned in advance rather than improvised, especially in an 11-point game
  where each serve has tactical value. The plan should reflect both the server’s own strengths and
  the opponent’s responses, and it may evolve during the match as patterns become clear.
  Developing both sides of the serve is important because regular opponents will quickly target a
  weak wide backhand if it is left vulnerable.
