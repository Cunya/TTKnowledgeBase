  unclear. The return is often topspin or no-spin and instructs the player to treat it as no-spin
  rather than using a backspin-like motion. How to handle unreadable short serves neutrally, with
  the racket between flat and upright and a focus on landing the ball first. A step-by-step
  fallback for unclear spin: slow push, middle contact, then slight sideways forearm motion. Not
