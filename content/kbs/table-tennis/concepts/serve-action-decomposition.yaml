id: concept-serve-action-decomposition
slug: serve-action-decomposition
label: Serve action decomposition
aliases: [segmented serve acceleration, finger-wrist-arm sequence]
short_definition: Sequence fingers, wrist, forearm, and upper arm instead of swinging the serve as one block.
evidence_summary: >-
  A good serve can be built by breaking the motion into separate action phases instead of trying
  to swing the arm through everything at once. The sequence emphasizes opening the forearm,
  pulling back in parallel, moving forward, and then adding upward motion, with finger-driven
  acceleration and brushing phases helping produce more spin. The practical correction is to use a
  slow backswing and a fast release rhythm, while adding extra wrist drive or a second brushing
  action when a serve needs more spin.
evidence_summary_source_hash: "sha256:9725169f34856e765c52761596df42bc26b2886d8f5adbb60dc6421fd239bd3b"
