id: concept-anticipate-early-to-avoid-rushing
slug: anticipate-early-to-avoid-rushing
label: Anticipate early to avoid rushing
aliases:
  - anticipate early
  - don't rush
  - why are you rushing
short_definition: Prepare for the ball in advance so you do not rush your movement or stroke timing.
evidence_summary: >-
  Anticipate early to avoid rushing brings together several connected ideas. Rushing happens
  because the player did not anticipate in advance. Rushing when the ball gets close reduces power
  and that you should wait until it is closer before initiating power. Elite players rise before
  contact because they anticipate the spin and shying away slows reactions and anticipation.
  Return difficulty comes from not anticipating, and explicitly tells players to practice
  anticipation and train it seriously. Not to rush and hesitation in reading the shot makes you
  too late. Rushing as a major error and the split second between strokes should be used to adjust
  body, position, and rhythm. Slow anticipation causes late stepping in and missed high-point
  contact, requiring reception as the ball starts to drop. Players rush unnecessarily, especially
  against backspin, even though there is enough time. Together, these principles show how the
  topic is applied in practice while preserving the relevant distinctions and constraints.
