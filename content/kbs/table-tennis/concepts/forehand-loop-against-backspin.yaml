id: concept-forehand-loop-against-backspin
slug: forehand-loop-against-backspin
label: Forehand loop against backspin
aliases: [looping underspin, opening loop, loop against a push]
short_definition: An opening forehand loop adjusted to lift and spin a backspin ball safely.
detailed_definition: Get the body and racket below the ball, choose contact height according to the available ball, and combine brushing with enough forward movement. A lower ball favors a safer high-arc spin loop; a higher ball permits a more forward power loop.
concept_type: stroke
facets:
  category: [stroke, receive]
  side: [forehand]
  spin: [topspin, against-backspin]
  level: [intermediate]
difficulty: intermediate
review_status: approved
