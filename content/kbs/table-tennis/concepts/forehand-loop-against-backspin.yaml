id: concept-forehand-loop-against-backspin
slug: forehand-loop-against-backspin
label: Forehand loop against backspin
aliases: [looping underspin, opening loop, loop against a push]
short_definition: An opening forehand loop adjusted to lift and spin a backspin ball safely.
evidence_summary: >-
  A forehand loop against backspin relies on a closed racket face, forward driving contact, and a
  parabolic arc rather than a brush-only action. Against heavier underspin, the upper arm should
  lift more to create a higher arc, while weaker spin calls for a flatter, more forward path; in
  all cases the stroke should press and brush forward close to the ball so it clears the net with
  usable power and shorter placement.
evidence_summary_source_hash: "sha256:bedcf37bff3a8fe71dcb90ad57f4a27d431e296335a643f37adaac1b1e74221f"
evidence_summary_generator: "codex"
detailed_definition: Get the body and racket below the ball, choose contact height according to the available ball, and combine brushing with enough forward movement. A lower ball favors a safer high-arc spin loop; a higher ball permits a more forward power loop.
concept_type: stroke
facets:
  category: [stroke, receive]
  side: [forehand]
  spin: [topspin, against-backspin]
  level: [intermediate]
difficulty: intermediate
review_status: approved
