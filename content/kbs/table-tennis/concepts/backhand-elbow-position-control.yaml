short_definition: The backhand punch requires a vertical, slightly down elbow position to stabilize contact and avoid netted or mistimed shots.
evidence_summary: >-
  Backhand elbow position control brings together several connected ideas. The first key point is
  elbow position and specifies keeping it vertical and slightly down. The key to tucking the
  racket behind the body is the elbow, and the elbow must stay close. The elbow should stay down
  and criticizes raising or pulling it back. The elbow must stay down and the motion should be
  back-and-forward, not upward or sideways. A high elbow as the cause of tension and the elbow
  must stay down, especially in the backswing and backhand drive/rip. To aim the elbow at the ball
  and not the shoulder, making elbow orientation a key setup cue. The elbow must stay stable and
  supported, acts as the pivot point, and should neither drop nor lift. The drive uses a lowered
  elbow while the rip requires the elbow to be lifted up. Additional points reinforce the same
  theme. Together, these principles show how the topic is applied in practice while preserving the
  relevant distinctions and constraints.
