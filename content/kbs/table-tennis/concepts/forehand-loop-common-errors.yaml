id: concept-forehand-loop-common-errors
slug: forehand-loop-common-errors
label: Forehand loop common errors
aliases: [loop corrections, push-brush error, vertical brushing error]
short_definition: Common loop failures include pushing before brushing, lifting only upward, rotating the wrist in place, reaching, and using maximum power before the stroke is stable.
evidence_summary: >-
  Common forehand loop mistakes usually come from too much vertical lift and not enough forward
  drive, which sends the ball long or leaves the stroke spinless. An unstable racket face,
  isolated wrist action, excessive upper-arm use, or an oversized swing can all reduce control and
  make the contact wobble, so the fix is to keep the motion compact, stable, and forward-directed.
evidence_summary_source_hash: "sha256:21d5004ca4fd443f0ffbe7812de38f64b19659869aadabbf6bdaf00f2a74ce0b"
evidence_summary_generator: "codex"
detailed_definition: These errors break the intended sequence or contact geometry. Useful corrections preserve a curved racket path, cover the ball, move forward through contact, maintain spacing, and develop the stroke below maximum effort before adding speed.
concept_type: troubleshooting
facets: {category: [error-correction, mechanics], side: [forehand], spin: [topspin], level: [beginner, intermediate]}
difficulty: beginner
review_status: approved
