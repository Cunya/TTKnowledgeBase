evidence_summary: >-
  Finger-assisted brushing brings together several connected ideas. The learner to use the middle
  and index fingers to press forward and upward and to press the racket forward with force. The
  fingers generate concentrated power, should press forward and upward, and create the friction at
  the moment of contact. The fingers and wrist are shown as active contributors to the arc, not
  just the forearm. Using only fingers and wrist, then says fingers and wrist speed up the
  brushing and can produce both spin and speed. Together, these principles show how the topic is
  applied in practice while preserving the relevant distinctions and constraints.
