id: concept-finger-assisted-brushing
slug: finger-assisted-brushing
label: Finger-assisted brushing
aliases:
  - use your fingers
  - finger control of forearm acceleration
  - press forward and upward
short_definition: Using the fingers to guide racket acceleration and contact direction, especially to increase brushing and create arc.
evidence_summary: >-
  Finger-assisted brushing brings together several connected ideas. The learner to use the middle
  and index fingers to press forward and upward and to press the racket forward with force. The
  fingers generate concentrated power, should press forward and upward, and create the friction at
  the moment of contact. The fingers and wrist are shown as active contributors to the arc, not
  just the forearm. Using only fingers and wrist, then says fingers and wrist speed up the
  brushing and can produce both spin and speed. The fingers and thumb pressure firm up the grip,
  apply force at contact, and keep the racket face stable, which is the finger-assisted control
  idea. To learn finger power and that faster brushing at contact produces more spin. A backspin
  return has weight and spin and 'a slight outward release of power with your fingers,' which
  supports finger-assisted stroke control. The invisible action makes serves harder to read and
  notes that contact relies on finger and wrist brushing. Together, these principles show how the
  topic is applied in practice while preserving the relevant distinctions and constraints.
