id: concept-backhand-rip-backswing
slug: backhand-rip-backswing
label: Backhand rip backswing
aliases:
  - backhand rip preparation
short_definition: Adjust backswing height and size to the incoming ball while preserving room for forward acceleration.
evidence_summary: >-
  The backhand rip begins from a slightly lower backswing than a backhand drive, usually around
  the lower abdomen, but it should stay compact and never drop so far that it becomes a looping
  action. For stronger topspin, the racket face starts closed and the ball is treated as if it
  stays underneath the racket before release, which preserves the friction-oriented shape of the
  stroke.
