  keep the racket face flat or upright and to adjust the face depending on ball height and bounce
  behavior. Sideways power direction and a closed racket face to correct placement and fewer
  mistakes. To slightly tilt/present the racket face and incorrect racket face direction causes
  errors. Additional points reinforce the same theme. Together, these principles show how the
  topic is applied in practice while preserving the relevant distinctions and constraints.
