short_definition: Against a dropping backspin ball, intercept from underneath, use fingers to lift and counter the spin first, then add power to loop.
evidence_summary: >-
  Looping against backspin by lifting first brings together several connected ideas. A backspin
  ball drops rapidly and must be countered with fingers before power looping. The correction is to
  lower the center of gravity and brush forward while staying above the table, which is the
  described lifting-into-topspin handling pattern. Looping against backspin uses a take-off curve,
  describes backspin as a take-off curve, and very low balls require fully using that curve. To
  wait for the ball to drop from its highest point and the best hitting point is the initial
  descent. With a very spinny ball, the hand should be low to lift the trajectory and handle the
  ball appropriately. Heavy spin requires waiting, brushing, crouching lower, and generating
  upward force to loop it up. Below-net balls require the racket to start lower than the ball and
  gives lifting a low backspin push as the example. Describes lifting a dropping backspin ball
  from below, combining brushing with forward drive, and sending it back with a matching arc.
  Additional points reinforce the same theme. Together, these principles show how the topic is
  applied in practice while preserving the relevant distinctions and constraints.
