evidence_summary: >-
  Looping against backspin by lifting first brings together several connected ideas. A backspin
  ball drops rapidly and must be countered with fingers before power looping. Meeting the ball
  head-on with a flat loop goes into the net; the motion must go low to high. The correction is to
  lower the center of gravity and brush forward while staying above the table, which is the
  described lifting-into-topspin handling pattern. The sequence directly: impact first to
  neutralize spin, then brush the ball. Looping against backspin uses a take-off curve, describes
  backspin as a take-off curve, and very low balls require fully using that curve. Spin and loop
  power come from borrowing the ball's downward force and combining it with an upward swing.
  Together, these principles show how the topic is applied in practice while preserving the
  relevant distinctions and constraints.
