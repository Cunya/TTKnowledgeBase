short_definition: In forehand attack, the forearm should do the main acceleration and power generation after the upper arm is stabilized.
evidence_summary: >-
  Forehand attack forearm-driven motion brings together several connected ideas. Forehand attack
  is dominated by the forearm, including acceleration and power generation, and that the forearm
  completes the remaining movement. To engage the forearm, attack the ball, and generate power
  forward. The difference is about body rotation and forearm speed, and that the right side drives
  the arm to align the hitting angle. A forehand attacking grip and to push forward with the
  fingers, using minimal range to generate friction and spin. Forearm-driven acceleration,
  especially for close-to-table attacks and blocks. The forearm is the primary driver and the
  backward-then-forward sequence with a final snap. A useful contrast is between uniform swing
  speed and a slow-to-fast pattern and calls that change of pace essential for power generation.
  The wrist is the primary power and that fingers only help transfer energy. Additional points
  reinforce the same theme. Together, these principles show how the topic is applied in practice
  while preserving the relevant distinctions and constraints.
