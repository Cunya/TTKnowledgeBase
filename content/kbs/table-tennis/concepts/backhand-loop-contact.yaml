id: concept-backhand-loop-contact
slug: backhand-loop-contact
label: Backhand loop contact
aliases:
  - backhand brushing height
short_definition: Brush the ball at a usable height and distance so the backhand loop can combine friction with forward control.
evidence_summary: >-
  Backhand loop contact works best when the ball is met around table height or slightly lower,
  rather than late and high where it tends to drift into the net or lose quality. Starting too
  early or brushing above the table are common errors, especially against side-spin or backspin,
  because they reduce the chance to contact the ball in a strong, workable zone. The spacing from
  the chest and the racket opening must also match the spin so the loop can produce spin without
  becoming soft or mistimed.
