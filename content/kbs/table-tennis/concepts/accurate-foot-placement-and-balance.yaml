evidence_summary: >-
  Accurate foot placement and balance brings together several connected ideas. Footwork as
  accurate foot placement and accurate balance for the proper hitting position. Stance as crucial,
  with feet shoulder-width apart for stability and leg stabilization for better hip use. Left foot
  forward, right foot back, and this front-back relationship is needed for good serves and weight
  transfer. Foot position and heel placement to the ability to generate friction. A wide stance
  improves lower-body stability and table coverage, while a narrow stance makes forehand movement
  harder. The common problem is not planting feet firmly, and that the shot requires planting
  before driving forward. Late contact and being off-balance when footwork is absent, and
  recommends small steps in or toward the ball to stay balanced and reach the correct position.
  Spacing problems to footwork and body positioning, and correct distance is required for
  comfortable, efficient shots. Additional points reinforce the same theme. Together, these
  principles show how the topic is applied in practice while preserving the relevant distinctions
  and constraints.
