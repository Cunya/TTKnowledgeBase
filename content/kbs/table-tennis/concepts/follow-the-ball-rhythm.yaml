short_definition: Track the opponent's rally rhythm and time your attention to the ball's tempo instead of relying only on your intended shot.
evidence_summary: >-
  Follow the ball rhythm brings together several connected ideas. Emphasizes tracking every step
  and following the rally rhythm because human reaction is slower than the ball. The rhythm should
  stay the same across positions and advises not to change your tempo, but to follow the
  opponent's rhythm. To keep up with the ball's rhythm and match response speed to the ball speed.
  Them to count and keep a steady 'one-two' rhythm and the rally is much healthier with that
  tempo. Together, these principles show how the topic is applied in practice while preserving the
  relevant distinctions and constraints.
