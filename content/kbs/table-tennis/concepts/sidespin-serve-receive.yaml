id: concept-sidespin-serve-receive
slug: sidespin-serve-receive
label: Receive sidespin serves
aliases:
  - sidespin-topspin receive
short_definition: Control sidespin by reading its mixture, matching the racket path, and avoiding unnecessary force.
evidence_summary: >-
  Receiving sidespin serves depends on matching racket angle, contact point, and swing size to the
  direction and spin of the ball. Against sidespin-topspin, a compact touch with a slightly closed
  face and little backswing helps keep the return short and controlled, while sidespin-backspin
  requires the racket to start lower, brush more, and finish quickly to overcome the spin. Because
  left and right sidespin drift differently, the contact must be adjusted to the side the ball is
  carrying toward.
evidence_summary_source_hash: "sha256:1865dd3f70db165fd6fcc6ee6e2c634108015aba4d26822f071a5f51da65bb1e"
