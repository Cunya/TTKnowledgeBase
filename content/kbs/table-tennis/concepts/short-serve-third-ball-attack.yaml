id: concept-short-serve-third-ball-attack
slug: short-serve-third-ball-attack
label: Short-serve third-ball attack
aliases: [third-ball attack, serve-and-attack pattern]
short_definition: Serve short to invite a slow push, then attack the first available return.
evidence_summary: >-
  A short serve is often the strongest setup for a third-ball attack because it invites a slower
  push return and creates a predictable rhythm change. The highest-percentage pattern is to serve
  short, expect a push, and attack at the peak with a loop or other prepared follow-up, especially
  when the serve carries light backspin. The value of the serve comes from the pressure it creates
  on the next ball rather than from trying to win immediately with an ace.
