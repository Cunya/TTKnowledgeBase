short_definition: Timing a shot on the rising or falling phase of the bounce rather than at the peak, often to increase tempo and make the return harder to time.
evidence_summary: >-
  Bounce-phase shot timing brings together several connected ideas. The shot should be taken on
  the rise or fall, never at the peak, and later reinforces early contact as a modern trend.
  Rising, peak, and falling contact and ties each phase to different outcomes for speed, power,
  and spin. Taking the ball on the rise versus at the peak of the bounce depending on incoming
  pace. Early contact, on the rise, and at the peak of the bounce as the desired timing. Multiple
  timing rules: early off the bounce or early descent for pushes, highest point for digging a long
  push, and waiting for the ball to drop for wide serves. Hitting at the peak, starting too early,
  and waiting until the ball starts dropping from its peak. A useful contrast is between contact
  on the rise and contact at the apex/high point of the bounce. Explains that 'at the peak' means
  start the swing there, and distinguishes peak, falling, and rising contact timing. Additional
  points reinforce the same theme. Together, these principles show how the topic is applied in
  practice while preserving the relevant distinctions and constraints.
