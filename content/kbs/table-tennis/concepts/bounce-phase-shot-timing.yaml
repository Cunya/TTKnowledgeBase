id: concept-bounce-phase-shot-timing
slug: bounce-phase-shot-timing
label: Bounce-phase shot timing
aliases:
  - on the rise
  - on the fall
  - not at the peak
  - early contact point
short_definition: Timing a shot on the rising or falling phase of the bounce rather than at the peak, often to increase tempo and make the return harder to time.
evidence_summary: >-
  Bounce-phase shot timing brings together several connected ideas. The shot should be taken on
  the rise or fall, never at the peak, and later reinforces early contact as a modern trend.
  Hitting before the peak causes a push-like motion with no arc, and the optimal contact point for
  topspin is the peak of the bounce. The weakest spin is on the rise or early descent and that the
  peak of the bounce is most potent. Explains that 'at the peak' means start the swing there, and
  distinguishes peak, falling, and rising contact timing. A useful contrast is between hitting at
  the peak and hitting on the rise and frames timing as the key variable. The ball should still be
  rising or at its peak as it crosses the net and that in pressure situations he focuses on
  securing the arc first. Not to swing the instant the ball touches the table and instead start
  the forward swing at the peak or early descent, including against backspin. Rising phase, peak,
  and falling phase, and the ideal topspin contact is at the peak of the bounce. Additional points
  reinforce the same theme. Together, these principles show how the topic is applied in practice
  while preserving the relevant distinctions and constraints.
