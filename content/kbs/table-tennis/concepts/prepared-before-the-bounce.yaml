short_definition: Preparing the stroke before the ball bounces reduces rushing and makes power generation easier.
evidence_summary: >-
  Prepared before the bounce brings together several connected ideas. Starting backswing only
  after the bounce prevents power and that the body should already be prepared before the ball
  arrives. The key is to get weight, rotation, and stroke ready early so the swing becomes a
  natural reaction. All adjustments should be made during the backswing, not at the moment of
  contact. To prepare before executing the shot and not to land, then prepare, because there is no
  time for that. Together, these principles show how the topic is applied in practice while
  preserving the relevant distinctions and constraints.
