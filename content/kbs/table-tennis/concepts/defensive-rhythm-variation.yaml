id: concept-defensive-rhythm-variation
slug: defensive-rhythm-variation
label: Defensive rhythm variation
aliases:
  - pause then hit
  - soft spin variation
short_definition: Change pace, arc, and timing from defense so a distant attacker cannot repeat one comfortable rhythm.
evidence_summary: >-
  Defensive play can become more effective when the rhythm is varied instead of repeated in a
  predictable way. A pause followed by a hit can disrupt the opponent's timing and make blocks
  harder to read. Choosing between close-table blocking and stepping back to defend also changes
  the kind of ball the player must handle, especially against soft but spinny returns.
