id: concept-block-trajectory-and-placement
slug: block-trajectory-and-placement
label: Block trajectory and placement
aliases:
  - low block
  - trajectory control
short_definition: Control the height, depth, and pace of the return to make the opponent's next attack less comfortable.
evidence_summary: >-
  Block quality is not only about contact but also about keeping the return low, controlled, and
  well placed. A low trajectory makes it harder for the opponent to attack with power, while
  precise placement to the middle, down the line, or into awkward zones can limit their options.
  Speed and added pressure matter, but only after the player can first absorb pace and prevent the
  ball from going long.
