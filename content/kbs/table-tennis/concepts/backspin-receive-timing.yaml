short_definition: On backspin or push receives, wait for the early descending phase instead of contacting too early at the peak.
evidence_summary: >-
  Backspin receive timing brings together several connected ideas. To hit backspin in the early
  descending phase and to wait until that phase for pushing. To wait for the ball to drop and then
  loop it back with more spin. Backspin problems to rhythm constraints, slow recovery, and rushing
  on the next ball after backspin. Heavy spin gives a very small reaction window, so stroke
  execution must be condensed and ordinary timing will fail. You cannot wait until after the
  opponent strikes and that reacting after the ball arrives is too late, which grounds receive
  timing against backspin and serve return. Not to rush, to wait, and then spin after the ball
  finishes its curve or after it lifts. Not to rush, to let the ball come to you, and to keep
  position steady while waiting to spot the ball. The rising, peak, and downward phases of
  underspin and the early descending phase is the most stable to attack. Additional points
  reinforce the same theme. Together, these principles show how the topic is applied in practice
  while preserving the relevant distinctions and constraints.
