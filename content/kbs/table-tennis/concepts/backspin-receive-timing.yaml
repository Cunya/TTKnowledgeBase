short_definition: On backspin or push receives, wait for the early descending phase instead of contacting too early at the peak.
evidence_summary: >-
  Backspin receive timing brings together several connected ideas. To hit backspin in the early
  descending phase and to wait until that phase for pushing. Taking the ball earlier, at the
  rising point or top of the bounce, rather than waiting too long. To wait for the ball to drop
  and then loop it back with more spin. Backspin problems to rhythm constraints, slow recovery,
  and rushing on the next ball after backspin. The player to wait for the ball, loop in the
  descending phase, and wait for it to drop lower. Heavy spin gives a very small reaction window,
  so stroke execution must be condensed and ordinary timing will fail. Together, these principles
  show how the topic is applied in practice while preserving the relevant distinctions and
  constraints.
