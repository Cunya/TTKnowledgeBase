short_definition: On backspin or push receives, wait for the early descending phase instead of contacting too early at the peak.
evidence_summary: >-
  Backspin receive timing brings together several connected ideas. To hit backspin in the early
  descending phase and to wait until that phase for pushing. Backspin problems to rhythm
  constraints, slow recovery, and rushing on the next ball after backspin. You cannot wait until
  after the opponent strikes and that reacting after the ball arrives is too late, which grounds
  receive timing against backspin and serve return. Not to rush, to let the ball come to you, and
  to keep position steady while waiting to spot the ball. Against rushing and to stay steady when
  returning backspin balls. To wait, brush, and contact during the descending phase for heavy-spin
  balls. Not to rush, to let the ball cross the net, and to time the backswing to the serve speed.
  Not to rush, to slow the rhythm, and to wait a fraction longer for a safer return on these
  balls. Additional points reinforce the same theme. Together, these principles show how the topic
  is applied in practice while preserving the relevant distinctions and constraints.
