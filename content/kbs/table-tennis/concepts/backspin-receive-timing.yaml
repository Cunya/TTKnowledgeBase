id: concept-backspin-receive-timing
slug: backspin-receive-timing
label: Backspin receive timing
aliases:
  - early descending phase
  - don't rush
  - wait for the ball to finish curving
short_definition: On backspin or push receives, wait for the early descending phase instead of contacting too early at the peak.
evidence_summary: >-
  Backspin receive timing brings together several connected ideas. To hit backspin in the early
  descending phase and to wait until that phase for pushing. Heavy spin gives a very small
  reaction window, so stroke execution must be condensed and ordinary timing will fail. Not to
  rush, to let the ball come to you, and to keep position steady while waiting to spot the ball.
  Backspin serve receive is the key case and rushing leaves the racket head pointed up at contact.
  Incorrect contact timing is identified as brushing too late or too early, which supports the
  receive-timing concept even though the exact phrase is not used here. Not to rush, to slow the
  rhythm, and to wait a fraction longer for a safer return on these balls. Waiting for slow balls
  to get close before starting the stroke and against rushing forward to hit on the rise.
  Contacting the heavy backspin ball just after the peak and waiting for the falling phase.
  Additional points reinforce the same theme. Together, these principles show how the topic is
  applied in practice while preserving the relevant distinctions and constraints.
