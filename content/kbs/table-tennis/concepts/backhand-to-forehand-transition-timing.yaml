id: concept-backhand-to-forehand-transition-timing
slug: backhand-to-forehand-transition-timing
label: Backhand-to-forehand transition timing
aliases:
  - hit as you land
  - rushed transition
  - small arm swing when moving a lot
short_definition: When transitioning from backhand to forehand, the available footwork time determines how compact the swing must be, and in rushed cases contact may happen as the foot lands.
evidence_summary: >-
  Backhand-to-forehand transition timing brings together several connected ideas. More foot
  movement means a smaller swing, and that in rushed backhand-to-forehand transitions you may need
  to hit as the foot lands. They later discuss moving from forehand back to backhand and the
  body's center of gravity must move across first. The same sequence applies to backhand-forehand
  transitions: feet land first, then the forehand backswing starts. The racket angle must change
  quickly during the backhand-to-forehand transition and that the hand must adjust while the feet
  are moving. The backhand-to-forehand move as the problem and later states that all such footwork
  follows the same principle. Left-then-right movement as the timing mistake and it creates
  same-arm, same-leg timing on fast balls. Compact backswing control on the side of the body
  during the backhand-to-forehand transition and names getting jammed as the failure mode.
  Together, these principles show how the topic is applied in practice while preserving the
  relevant distinctions and constraints.
