id: concept-forehand-loop
slug: forehand-loop
label: Forehand loop
aliases:
  - forehand topspin
  - forehand loop drive
short_definition: A forehand topspin stroke that brushes the ball with forward-and-upward acceleration.
evidence_summary: >-
  The forehand loop is an attacking stroke that uses a forward-upward swing with a brushing
  contact to create topspin while still driving through the ball. Its power comes from late
  acceleration and a contact point chosen to match the incoming spin and height, so a loop against
  backspin requires more brushing and a loop against topspin needs a balanced mix of impact and
  brush. For beginners, the key is to feel the ball cleanly at contact and to distinguish looping
  from driving, since the loop depends on generating spin as well as speed.
evidence_summary_source_hash: "sha256:4d7d6ddf1d9bd2898af033e639040e4c26fa14589b49cc97a7f0c6adb5420e9d"
evidence_summary_generator: "codex"
detailed_definition: The racket brushes the upper back of the ball while accelerating forward and upward, with contact in front of the body.
concept_type: stroke
facets:
  category: [stroke]
  side: [forehand]
  spin: [topspin]
  level: [intermediate]
difficulty: intermediate
review_status: approved
