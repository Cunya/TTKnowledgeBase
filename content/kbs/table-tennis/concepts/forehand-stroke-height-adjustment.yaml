short_definition: Changing racket height and backswing height to match the incoming ball height and prevent net errors.
evidence_summary: >-
  Forehand stroke height adjustment brings together several connected ideas. Racket height should
  be adjusted to the ball's height and that lowering the backswing helps get low balls over the
  net. Higher balls need a higher backswing and low balls require lowering the racket, with
  adjustment based on incoming ball height. Closer or shorter balls require more compact control
  and that farther balls require more space. Together, these principles show how the topic is
  applied in practice while preserving the relevant distinctions and constraints.
