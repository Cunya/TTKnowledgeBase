id: concept-forehand-loop-swing-path
slug: forehand-loop-swing-path
label: Forehand loop swing path and racket angle
aliases: [loop arc, outer-arc loop, covering the ball]
short_definition: The racket travels on an outer arc while a suitably closed face brushes and drives through the ball.
evidence_summary: >-
  The forehand loop swing path should cover the ball with a stable diagonal racket face rather
  than a purely vertical brushing motion. The forearm drives forward and up through contact, the
  racket head starts the acceleration, and the motion stays compact and controlled so the ball is
  lifted with forward drive instead of being sent long or into the net.
evidence_summary_source_hash: "sha256:f0b87bd876a6766a6d599a999a1ba1ce188dc0862af9120a34d6924e60c9efdd"
evidence_summary_generator: "codex"
detailed_definition: A loop is not merely a larger drive. The racket head follows an outer arc, covers the ball with a closed face, and moves forward through contact. The precise balance of impact and brush changes with incoming spin, height, and the desired arc.
concept_type: principle
facets:
  category: [mechanics, stroke]
  side: [forehand]
  spin: [topspin]
  level: [intermediate]
difficulty: intermediate
review_status: approved
