id: concept-forehand-loop-swing-path
slug: forehand-loop-swing-path
label: Forehand loop swing path and racket angle
aliases: [loop arc, outer-arc loop, covering the ball]
short_definition: The racket travels on an outer arc while a suitably closed face brushes and drives through the ball.
detailed_definition: A loop is not merely a larger drive. The racket head follows an outer arc, covers the ball with a closed face, and moves forward through contact. The precise balance of impact and brush changes with incoming spin, height, and the desired arc.
concept_type: principle
facets:
  category: [mechanics, stroke]
  side: [forehand]
  spin: [topspin]
  level: [intermediate]
difficulty: intermediate
