evidence_summary: >-
  Serve action combination brings together several connected ideas. Brushing along the ball, then
  cutting, and brushing alone gives spin without speed while cutting alone gives speed without
  spin. To first develop speed or impact, then spin, and only then mix the two together. The
  motion as contact, brush, and follow-through, and recommends practicing chop and follow-through
  separately before connecting them. The serve into spin-first and speed-second phases. To add a
  final wrist flick after contact and then scoop after cutting the ball to create heavy spin.
  Serves become spinny by combining forces, lifting as the ball falls for topspin and chopping
  down from above for backspin. The serve should be understood as a two-part motion that blends
  into one fluid motion. Serve spin as a quick brush followed by a forward push or send-off, which
  is a linked action sequence. Additional points reinforce the same theme. Together, these
  principles show how the topic is applied in practice while preserving the relevant distinctions
