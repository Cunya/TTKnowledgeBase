id: concept-third-ball-adjustment
slug: third-ball-adjustment
label: Third-ball adjustment
aliases:
  - serve follow-up
  - serve plus one adjustment
short_definition: Adjust the third ball to the serve's spin, the actual return trajectory, and the time available for backswing and positioning.
evidence_summary: >-
  Third-ball attacking works best when the follow-up is adjusted to the spin, depth, and timing of
  the return rather than forced mechanically. After serving, the player may need to lower the
  center of gravity, brush more against heavy spin, wait for a sidespin curve to finish, or take a
  softer ball earlier because it does not supply much rebound. A reliable pattern is to delay the
  backswing until the return crosses the net, then move through the stroke in one motion so timing
  stays stable and the response fits the incoming ball.
evidence_summary_source_hash: "sha256:8957bce62df7e8a5175a539c0eae7a862fc1a3d81d989a1218cc87e9450aee8f"
evidence_summary_generator: "codex"
