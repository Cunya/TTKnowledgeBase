short_definition: Keeping the backhand wrist locked or hooked so the stroke remains solid, with the forearm generating the motion instead of the wrist collapsing or wiping across.
evidence_summary: >-
  Backhand wrist stability and hooking brings together several connected ideas. States that the
  most common backhand issue is failing to lock the wrist and that collapse or wobble is
  incorrect. Difficulty hooking the wrist at the start of looping, then instructs keeping the
  index finger fixed, hooking the side, and driving forward and upward with wrist pressure at
  impact. A tight wrist blocks rotation space, shows wrist rotation, and instructs opening the
  wrist and hooking inward through contact. Together, these principles show how the topic is
  applied in practice while preserving the relevant distinctions and constraints.
