id: concept-backhand-rip
slug: backhand-rip
label: Backhand rip
aliases:
  - backhand drive attack
  - backhand rip vs drive
short_definition: Use a longer, more forceful backhand topspin action when the ball and available time permit more acceleration than a compact drive.
evidence_summary: >-
  The backhand rip is a compact, spin-driven backhand skill that sits alongside the backhand drive
  but places more emphasis on friction, wrist flick, and handling spin. Compared with the backhand
  drive or punch, it uses a different backswing height and motion structure, making it especially
  useful for defensive replies and serve returns with inverted rubber. Its main purpose is to
  create enough spin and racket speed that a larger motion can still bring the ball down safely.
