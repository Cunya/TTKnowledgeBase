id: concept-contact-point
slug: contact-point
label: Contact point
aliases:
  - ball contact
short_definition: The position and timing at which the racket meets the ball.
evidence_summary: >-
  Good shot quality depends on finding the correct contact point on the ball at the right phase of
  its bounce cycle. Contact should be made on the intended part of the ball, not the side, and the
  player must stay with the contact point by creating space for it instead of losing it through
  poor movement. If the contact point is misread or the body moves away from it, the shot becomes
  unstable and the ball is struck at the wrong moment or position.
evidence_summary_source_hash: "sha256:739577c6cfdfcd954f7d281d6153b651cfff64373db55abe2e836578c0aac4d1"
evidence_summary_generator: "codex"
detailed_definition: For this forehand-loop example, contact is in front of the body near the top of the bounce; late contact reduces space and consistency.
concept_type: technique-dimension
facets:
  category: [fundamentals]
  side: [neutral]
  level: [beginner, intermediate]
difficulty: beginner
review_status: approved
