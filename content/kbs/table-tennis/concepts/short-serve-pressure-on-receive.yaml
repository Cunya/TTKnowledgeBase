short_definition: A short serve is valuable because it constrains the receiver's options, making aggressive pushes, flicks, and banana flicks difficult.
evidence_summary: >-
  Short serve pressure on receive brings together several connected ideas. Directly states the
  short-serve pressure claim and the restricted receive options. The key to a good short serve is
  keeping trajectory low, because a high arc makes flicks and long pushes easy. Certain
  kicker/hook serves make pushing impossible and flicking from a distance unreliable, creating
  pressure on receive. This serve is difficult to flick and forces the opponent into weak or
  confused returns. The short serve is easier to execute, travels slower, and is easier for the
  opponent to read. Short serves should stay short and low so they are difficult to push, flick,
  or banana-flick aggressively. The serve makes a push pop up, a flick go long, and leaves only a
  soft block as the safe option. Together, these principles show how the topic is applied in
  practice while preserving the relevant distinctions and constraints.
