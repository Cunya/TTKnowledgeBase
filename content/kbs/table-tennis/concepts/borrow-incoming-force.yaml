short_definition: When late or poorly prepared, a player should redirect or borrow the incoming ball's force instead of forcing a full-power stroke.
evidence_summary: >-
  Borrow incoming force brings together several connected ideas. Using the opponent's or incoming
  power when preparation is late or incomplete. To use the ball's incoming force and borrow the
  spin. To follow the spin's direction and send the ball back along its path to neutralize the
  spin. Borrowing power from the ball's rise or fall and combining it with the player's own
  effort. To borrow the opponent's power and use combined force while making very small movements.
  Against a fast push you can use its pace and that the opponent has already supplied the power.
  Using the ball's existing friction/pressure to make the loop work, which is effectively
  borrowing incoming force. When using topspin technique against underspin, players rely on
  borrowed power and leverage the incoming ball. Together, these principles show how the topic is
  applied in practice while preserving the relevant distinctions and constraints.
