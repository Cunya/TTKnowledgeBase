evidence_summary: >-
  Distance-dependent stroke size brings together several connected ideas. Swing size and body
  mechanics to distance from the table. Half-long balls should be looped while moving forward to
  close the distance, and a reasonable range is enough for amateurs. Multiple segments state that
  distance determines swing size, forearm height, and whether upper arm contribution is needed.
  Being too close jams the stroke and that looping needs about one meter of distance to allow a
  proper stroke. A concrete rule: arm's length for deep balls and forearm's length for short or
  half-long balls. Balls by depth and ties each depth to different spacing requirements. Rushing
  often comes from standing too close, that players need at least arm's length, and that short
  balls can be handled by stepping in. Together, these principles show how the topic is applied in
  practice while preserving the relevant distinctions and constraints.
