id: concept-forearm-led-motion-in-backhand
slug: forearm-led-motion-in-backhand
label: Forearm-led motion in backhand
aliases:
  - forearm should lead
  - remaining motion is completed by the forearm
  - upper arm should stop at 3
short_definition: Backhand striking power and finishing action should be driven primarily by the forearm, with the upper arm staying limited and controlled.
evidence_summary: >-
  Forearm-led motion in backhand brings together several connected ideas. The upper arm should not
  dominate, the forearm should lead, and the rest of the motion is completed by the forearm. The
  forearm drives the shot forward, the elbow is the pivot, and the elbow should not move with the
  arm. The racket is led down by the forearm and that both backhand and forehand attacks require
  forearm-driven adjustment. A useful contrast is between wrist-driven flicks and a forearm-driven
  return and says the forearm adds lift or power after contact. The forearm should accelerate, the
  upper arm should stabilize, and initial drills should isolate forearm motion. To stay over the
  ball, use a compact motion, and that the forearm is mainly driving forward with limited
  upper-arm and wrist use. The upper arm should point down and remain stable while the forearm and
  wrist handle the fine adjustments. The return becomes easy through forearm and wrist power, with
  less arm in the backswing and a wrist turn to send the ball back. Additional points reinforce
  the same theme. Together, these principles show how the topic is applied in practice while
  preserving the relevant distinctions and constraints.
