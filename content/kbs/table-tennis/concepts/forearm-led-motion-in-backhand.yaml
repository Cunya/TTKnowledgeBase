short_definition: Backhand striking power and finishing action should be driven primarily by the forearm, with the upper arm staying limited and controlled.
evidence_summary: >-
  Forearm-led motion in backhand brings together several connected ideas. The upper arm should not
  dominate, the forearm should lead, and the rest of the motion is completed by the forearm. The
  forearm must pull back horizontally, then drive through the ball, using the elbow as a pivot.
  The forearm drives the shot forward, the elbow is the pivot, and the elbow should not move with
  the arm. The forearm presses the ball, controls the arc, and should be used more than the wrist
  when the incoming ball is spinny. A two-stage backhand motion: move forward together, then let
  the forearm accelerate through the ball. The racket is led down by the forearm and that both
  backhand and forehand attacks require forearm-driven adjustment. The forearm drives the backhand
  and the push-forward-plus-external-rotation sequence around the elbow. A useful contrast is
  between wrist-driven flicks and a forearm-driven return and says the forearm adds lift or power
  after contact. Additional points reinforce the same theme. Together, these principles show how
  the topic is applied in practice while preserving the relevant distinctions and constraints.
