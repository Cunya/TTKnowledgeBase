short_definition: Using body orientation and shoulder opening to create space and a workable backhand position when the wrist feels stiff.
evidence_summary: >-
  Body angle for opening the backhand position brings together several connected ideas. If the
  wrist cannot open, the solution is to move the body, turn slightly sideways, and open the
  shoulder a little. To open the body, turn sideways to the table, and threaten both straight and
  cross-court angles. Players to open the hips, shoulders, knees, and toes to about a 45-degree
  angle rather than staying square, explicitly tying it to forehand protection and avoiding being
  jammed. Turning the body sideways to create space, moving both feet, and using two steps for
  half-long balls versus one step for long balls. To step in with the body turned sideways, not
  square, to create space and engage power. Players to align the body cross-court and keep the
  left shoulder forward and right shoulder back for the backhand base position. Together, these
  principles show how the topic is applied in practice while preserving the relevant distinctions
  and constraints.
