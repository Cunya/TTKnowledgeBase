id: concept-serve-receive-reading-and-rhythm
slug: serve-receive-reading-and-rhythm
label: Serve-receive reading and rhythm
aliases:
  - receive rhythm matching
  - early serve-spin judgment
short_definition: Judge spin and placement early, move to a repeatable contact position, and match the receive rhythm to the serve before adding spin-specific acceleration.
evidence_summary: >-
  Effective receive depends on reading the serve early enough to recognize spin and bounce
  behavior before the ball gets too close. The first bounce on the server’s side can reveal
  whether the serve carries topspin or backspin, and the timing between the first and second
  bounce helps set the receiver’s rhythm. When spin is unclear or opponents vary their action, the
  receiver should watch the racket motion carefully and adjust the loop or brushing action
  accordingly.
evidence_summary_source_hash: "sha256:d60b19125ef6c171dbce6c1e47a53d991e34d57fad5e9c304fb59d0b87a6c890"
