short_definition: Adjusting the body closer to the ball on short or in-table pushes so the contact can be made in time and with control.
evidence_summary: >-
  Close-distance control for pushes brings together several connected ideas. Short-ball success to
  getting close, staying in position, and avoiding too much backswing or late contact. A useful
  contrast is between long-ball pushes requiring space and short-ball pushes requiring staying
  close. Receive requires getting close to the ball and maintaining the correct distance. Being
  close to the ball and close to the point of contact stabilizes the push and improves quality.
  Push quality depends on how close you are to the ball and that any space reduces control. Not to
  stand too close after serve, but also explains that staying closer to the ball is better than
  being too far away when attacking short balls. Stepping in close as soon as the ball pops up and
  staying close to the ball for half-long high balls. To step in, get close to the ball, and
  cushion it when cramped, especially on short returns and uncertain receives. Additional points
  reinforce the same theme. Together, these principles show how the topic is applied in practice
  while preserving the relevant distinctions and constraints.
