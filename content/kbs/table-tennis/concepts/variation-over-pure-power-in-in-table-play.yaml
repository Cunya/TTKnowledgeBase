  - not purely a power-based game
short_definition: A match principle that in-table play is won through variation and deceptive shot selection rather than power alone.
evidence_summary: >-
  Variation over pure power in in-table play brings together several connected ideas. In-table
  play is not purely power-based and that variation and trick shots are needed to deceive
  opponents. Adding power causes mistakes, while sideways force makes the shot more stable and
  controlled. Varying play, not using all powerful shots early, and avoiding repeated spin or
  placement. Matching the opponent's pace blindly is harmful and that even-paced brushing and
  acceleration choices matter more than raw force. Winning does not always come from attacking and
  that many points are won through variation, deception, and mixing different shot types. These
  shots demand finesse over brute force and control over power management. Not to do this for
  every ball and mixing spin, pace, and placements makes opponents fear you. Variation wins
  matches by making opponents hesitate and make mistakes. Additional points reinforce the same
  theme. Together, these principles show how the topic is applied in practice while preserving the
  relevant distinctions and constraints.
