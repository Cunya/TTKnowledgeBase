evidence_summary: >-
  Close-table defensive positioning brings together several connected ideas. To get the racket up
  immediately, keep it inside the table on early contact, and not back off against heavy spin. To
  step in, lower the stance, and move in after serving to handle the next ball smoothly. Not to
  stay inside the table, but also not to retreat backward immediately after pushing, which is
  about close-table defensive positioning and recovery balance. Says to stand closer against pips
  and not back up to scoop or lift the ball. Closeness to the body makes the shot more explosive
  and repeatedly instructs to avoid extending the hand or arm too far. Many balls are played near
  the table edge and explicitly recommends staying closer to the table for receiving and blocking.
  To lower the body as the ball lands, move in to receive, and reach out to the ball without
  missing the serve. The player is too close after serving, has insufficient time to move, and
  should maintain an arm's-length distance. Additional points reinforce the same theme. Together,
  these principles show how the topic is applied in practice while preserving the relevant
  distinctions and constraints.
