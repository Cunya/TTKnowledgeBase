short_definition: Staying close enough to the table, with the racket held up and inside the table, to take the ball early instead of retreating under pressure.
evidence_summary: >-
  Close-table defensive positioning brings together several connected ideas. To get the racket up
  immediately, keep it inside the table on early contact, and not back off against heavy spin. To
  step in, lower the stance, and move in after serving to handle the next ball smoothly. The
  advice to lower the stance and prepare professionally before serve supports close-table
  readiness and defensive positioning. Not to stay inside the table, but also not to retreat
  backward immediately after pushing, which is about close-table defensive positioning and
  recovery balance. Says to stand closer against pips and not back up to scoop or lift the ball.
  Repeatedly emphasized as key to explosiveness and threat, across forehand/backhand and straight
  shots. Closeness to the body makes the shot more explosive and repeatedly instructs to avoid
  extending the hand or arm too far. Many balls are played near the table edge and explicitly
  recommends staying closer to the table for receiving and blocking. Together, these principles
  show how the topic is applied in practice while preserving the relevant distinctions and
  constraints.
