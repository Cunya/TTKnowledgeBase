short_definition: Keep appropriate space between body, racket, and ball so the forehand brush loop can contact cleanly without crowding the stroke.
evidence_summary: >-
  Forehand contact spacing and racket distance brings together several connected ideas. Waiting
  under the table and keeping the racket below the table during the stroke. To keep the hand even
  more forward against very fast sidespin topspin so the ball does not jam you. The stroke is too
  close to the body and the racket is near the torso, which hurts the action. To wrap the ball,
  increase contact time, and maintain contact around the ball rather than make a brief push
  contact. Racket height and backswing position depend on distance to the table, and that being
  too low when close will cause a miss. One palm's width from the waist, warns against cramped or
  too-distant arm positions, and links opening space to power generation. To keep the racket below
  table level, step back slightly, and allow enough space for the contact point so the stroke is
  not jammed. Managing horizontal and vertical distance on the forehand to avoid jamming and
  maintain a workable stroke envelope. Together, these principles show how the topic is applied in
  practice while preserving the relevant distinctions and constraints.
