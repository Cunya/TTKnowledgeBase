id: concept-push-rally-strategy
slug: push-rally-strategy
label: Push-rally strategy
aliases:
  - push-to-attack strategy
  - push rally planning
short_definition: Use recovery, depth, placement, spin reading, and a clear attack decision to make the push rally create an easier opening ball.
evidence_summary: >-
  In a push rally, each push must be followed by immediate recovery so the player is not caught
  off guard by the next ball. Good strategy centers on pushing low, deep, and with enough pressure
  to jam the opponent, while avoiding half-long balls that invite attack. The player also needs to
  vary placement, recognize deceptive weak-spin or carry balls, and commit fully when choosing to
  attack rather than hesitating.
evidence_summary_source_hash: "sha256:465d28cf42778fc059b7328a5f760605cc0c3221a4ec2bafc0095abdb88b65f4"
