id: concept-keep-the-ball-low
slug: keep-the-ball-low
label: Keep the ball low
aliases:
  - low ball
  - keep trajectory low
  - serve low
short_definition: Keeping the ball and its trajectory low to force weaker, slower, or more error-prone opponent attacks.
evidence_summary: >-
  Keep the ball low brings together several connected ideas. A high ball invites smashes, a low
  ball slows the loop, and the trajectory should always be kept low. The arc and contact point
  must be low and close to the body. The finish is repeatedly constrained to net height, low
  position, and downward motion. Low trajectory as a primary goal and how racket-tip and angle
  adjustments keep the return low. The stroke height must be controlled and that the resulting
  ball should be low and spinny. To keep the upper trajectory low and shorter is better when
  making heavy spin serves. To lower the body, keep the body low, and stay crouched during receive
  and looping. The learner to aim lower and repeatedly emphasizes that the ball should stay low
  and stable. Additional points reinforce the same theme. Together, these principles show how the
  topic is applied in practice while preserving the relevant distinctions and constraints.
