id: concept-keep-the-ball-low
slug: keep-the-ball-low
label: Keep the ball low
aliases:
  - low ball
  - keep trajectory low
  - serve low
short_definition: Keeping the ball and its trajectory low to force weaker, slower, or more error-prone opponent attacks.
evidence_summary: >-
  Keep the ball low brings together several connected ideas. A high ball invites smashes, a low
  ball slows the loop, and the trajectory should always be kept low. The finish is repeatedly
  constrained to net height, low position, and downward motion. The stroke height must be
  controlled and that the resulting ball should be low and spinny. To lower the body, keep the
  body low, and stay crouched during receive and looping. Popped-up pushes get attacked and
  repeatedly instructs to keep the trajectory low and brush the very bottom to stay out of the
  net. Low returns and low pushes to denying speed and easy attacks. The primary goal when pushing
  is to keep the ball low, skimming the net. Low contact and low-to-high brushing as the basis of
  the serve. Additional points reinforce the same theme. Together, these principles show how the
  topic is applied in practice while preserving the relevant distinctions and constraints.
