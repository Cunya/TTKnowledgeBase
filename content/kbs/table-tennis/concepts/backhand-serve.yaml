id: concept-backhand-serve
slug: backhand-serve
label: Backhand serve
aliases:
  - backhand sidespin serve
  - backhand serve deception
short_definition: Use a backhand-side brushing action, controlled toss, forearm acceleration, and shared motion shape to vary sidespin, topspin, and backspin.
evidence_summary: >-
  The backhand serve is presented as easy to learn but difficult to judge well, because its
  effectiveness depends on how cleanly the racket wraps the ball rather than on a simple forward
  hit. Spin comes mainly from lateral friction, so the toss should be to the left side near the
  left hip and contact should happen early before the arm extends past the ball; a loose, lively
  grip helps the racket head whip and produce more rotation. Deception comes from making different
  spins look the same in preparation and motion, so variation in setup is a major part of the
  serve's value.
evidence_summary_source_hash: "sha256:fc41be6ec9d3aaf8ee063ef12cf7339f08427144165fdb8a28ebdc3635469d74"
evidence_summary_generator: "codex"
