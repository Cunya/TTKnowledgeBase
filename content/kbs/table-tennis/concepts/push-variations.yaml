id: concept-push-variations
slug: push-variations
label: Push variations
aliases:
  - adaptive pushing
  - fast push
  - floating push
  - flat push
short_definition: Vary push speed, spin, depth, timing, and sideways contact to disrupt different opponents while keeping the ball low and reliable.
evidence_summary: >-
  Push variations depend on spin, speed, and depth, but the basic goal is to stay calm and
  redirect the ball rather than force your own pace. Short compact pushes work well against little
  or no spin, while heavier spin may call for steadier tempo or more forward motion, and fast or
  low balls often require flatter, more controlled choices. Players can also mix long pushes,
  short explosive touch pushes, slow chops, and drop-short options to control the rally and
  exploit uncertainty in the incoming spin.
evidence_summary_source_hash: "sha256:11755f2743676548f50d17a3e17fba38cf63ba365a5e08917d785c2dd2b82989"
evidence_summary_generator: "codex"
concept_type: stroke-variation
