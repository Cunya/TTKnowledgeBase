short_definition: 'Adjust swing timing based on whether the incoming ball is topspin or backspin: start on the bounce for topspin, and wait for the ball to land before swinging on backspin.'
evidence_summary: >-
  Timing by bounce type brings together several connected ideas. A useful contrast is between
  topspin timing and backspin timing and states when to start the swing for each. A short serve by
  observing the first bounce. Swing timing to hearing the bounce sound and starting only after the
  ball hits the table. The best hitting point as the initial descent and explicitly excludes the
  peak and upward phase. Whiffs happen when the toss and swing are out of sync and that serve
  quality depends on placing the first bounce in the correct zone for short and long serves.
  Multiple strokes to rise, apex, and fall contact timing. The first bounce is used to judge serve
  length and distinguishes short or half-long from long based on bounce zone. The lesson
  repeatedly centers on the first and second bounce, including the path between them, as the
  decision window for identifying spin and timing the receive. Additional points reinforce the
  same theme. Together, these principles show how the topic is applied in practice while
  preserving the relevant distinctions and constraints.
