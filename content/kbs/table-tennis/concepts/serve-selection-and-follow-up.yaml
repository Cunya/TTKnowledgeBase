id: concept-serve-selection-and-follow-up
slug: serve-selection-and-follow-up
label: Serve selection and follow-up
aliases: [opponent-specific serving, serve-plus-one planning]
short_definition: Choose serve spin, depth, speed, and angle for the opponent's preferred return, then plan the next attack.
evidence_summary: >-
  Serve selection should be based on the opponent’s likely return, but it also has to fit the
  server’s own strengths and the intended follow-up. Some serves, such as side-topspin patterns,
  are useful because they rise and travel long enough to invite an attack, while other patterns
  are chosen to maximize spin against weak readers or deception against strong readers. The key is
  to choose placement, speed, and spin with the next shot in mind, and to switch plans when the
  likely follow-up becomes disadvantageous.
evidence_summary_source_hash: "sha256:423f07a27999874907a989451b16550854ea7e61033ceacbeba29def12a551d1"
evidence_summary_generator: "codex"
