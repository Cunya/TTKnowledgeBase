id: concept-control-before-power
slug: control-before-power
label: Control before power
aliases:
  - controlled power
  - settle the rhythm
short_definition: Establish position, spacing, timing, and ball control before adding maximum acceleration or power.
evidence_summary: >-
  Control comes before power because consistency and timing have to be established before
  increasing swing speed. A player should match the incoming rhythm, reduce unnecessary force, and
  build a safe, reliable push or attack pattern that can later be expanded. The emphasis is on
  executing the movement correctly first and letting power grow from stable rhythm and spacing
  rather than forcing speed early.
evidence_summary_source_hash: "sha256:f247ab33190ae3f7e7f1fd6fe01770ec44ee5ab837a1886db0ed68e9d868cd57"
evidence_summary_generator: "codex"
