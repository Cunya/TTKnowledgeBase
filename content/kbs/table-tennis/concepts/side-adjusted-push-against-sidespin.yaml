short_definition: A push receive that matches the incoming sidespin by adjusting racket angle and brushing the ball's side.
evidence_summary: >-
  Side-adjusted push against sidespin brings together several connected ideas. A useful contrast
  is between a push that goes and the spin with one that hits the net, then specifies racket-angle
  adjustment and brushing the right side against left sidespin. The short push to the forehand
  wide angle uses a retraction and extension motion, brushes the side of the ball, and generates
  friction by brushing sideways. To add sideways motion on pushes, match the server's racket
  angle, and adjust the hand height and direction against sidespin and side-topspin. The mirror
  principle and shows slight angle, off-center contact, and going with the spin. To always contact
  the side of the ball and slightly off-center when pushing. A direct rule for unclear spin: push
  sideways, slightly down, to kill upward trajectory and keep the ball low. The solution is to
  push forward and sideways, aim toward the center line, and use sideways motion to lower the arc,
  especially when spin is hard to read. To adjust the racket angle and contact the side of the
  ball rather than the direct back. Together, these principles show how the topic is applied in
  practice while preserving the relevant distinctions and constraints.
