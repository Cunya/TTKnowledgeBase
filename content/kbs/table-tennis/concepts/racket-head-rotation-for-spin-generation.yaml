evidence_summary: >-
  Racket head rotation for spin generation brings together several connected ideas. Lack of
  racket-head rotation causes weak spin and that rotating the racket head increases friction,
  spin, and speed. The push should use the racket head and that racket-head rotation naturally
  generates forward motion and power. Racket-head rotation and acceleration as the key to
  producing spin, with a direct demonstration of weak versus explosive acceleration. Racket-head
  rotation as a first key point and as part of creating friction on the ball. The viewer to watch
  the racket head direction and it rotating during the stroke. Attention to racket-head direction,
  rotation, and the need to lift after contact rather than remaining downward, showing racket-head
  rotation as part of the stroke mechanics. The racket head must spin/rotate and links that
  rotation to ball spin generation. A specific racket-head path from 7:00 to 2:00 and rotation
  makes heavy spin become light. Together, these principles show how the topic is applied in
  practice while preserving the relevant distinctions and constraints.
