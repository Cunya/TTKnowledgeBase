  friction-based technique requires racket-head rotation to generate spin. Friction depends on
  racket-head rotation and acceleration, not just arm motion. A useful contrast is between a
  vertical, impact-only motion and a rotating racket head and says rotation is required for spin
  and intensity. Additional points reinforce the same theme. Together, these principles show how
  the topic is applied in practice while preserving the relevant distinctions and constraints.
