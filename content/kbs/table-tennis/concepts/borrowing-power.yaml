  power and borrowed force with actively generating force. Using the opponent's pace as a compact
  backswing with acceleration after contact, especially when rushed or jammed. To borrow the
  opponent's power and that this is the key to making the backhand faster. Additional points
  reinforce the same theme. Together, these principles show how the topic is applied in practice
  while preserving the relevant distinctions and constraints.
