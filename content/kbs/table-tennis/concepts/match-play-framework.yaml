id: concept-match-play-framework
slug: match-play-framework
label: Match-play framework
aliases:
  - match phases
  - match mindset
short_definition: Organize match decisions by phase, score context, and the information learned from earlier points.
evidence_summary: >-
  Match play requires a mindset that turns nervous energy into readiness and avoids assuming
  defeat before the point is played. The player should identify the weakest phase of play and
  build a simple plan around it, often by emphasizing serve, receive, and the third ball while
  adjusting aggression to the score and the stage of the rally. Incoming spin and pace should be
  judged first, then answered with the right amount of brush, impact, blocking, or attacking so
  that consistency and tactical control are preserved.
