id: concept-backhand-loop-swing-path
slug: backhand-loop-swing-path
label: Backhand loop swing path
aliases:
  - elbow pivot
  - sideways backhand force
short_definition: Use the elbow as an organized pivot while directing the forearm path to balance spin, forward force, and depth.
evidence_summary: >-
  The backhand loop should travel in a curved, brushing path around a stable elbow axis, with the
  forearm moving below the elbow in the backswing and finishing above it through contact. Instead
  of pushing straight forward or simply lifting upward, the stroke should open through a
  controlled arc that adds topspin by combining forward drive with a sideways-curving brush. This
  path helps prevent long shots while preserving the friction needed for a quality loop.
