id: concept-loose-grip-backhand-friction
slug: loose-grip-backhand-friction
label: Generating spin at contact
aliases: [loose grip friction, racket-head acceleration, brushing contact]
short_definition: Create spin by allowing the racket head to accelerate and brush the correct part of the ball instead of squeezing or pushing rigidly.
detailed_definition: "Spin emerges from both freedom and precision: a relaxed grip permits last-moment racket-head speed, rotation adds brushing force, and the contact region determines the resulting spin."
concept_type: technique-principle
facets: {category: [spin, contact, acceleration], side: [neutral], level: [intermediate]}
difficulty: intermediate
review_status: approved
