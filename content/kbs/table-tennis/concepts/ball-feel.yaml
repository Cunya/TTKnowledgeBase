id: concept-ball-feel
slug: ball-feel
label: Ball feel
aliases: [touch, rhythm control, spatial awareness]
short_definition: The combined ability to sense timing, space, contact, and tempo so the stroke adapts to each incoming ball.
evidence_summary: >-
  Ball feel is the ability to sense touch, spacing, rhythm, and spin as one connected skill. It
  depends on reading the bounce, adjusting contact quality, and matching the response to the
  ball’s speed and spin, especially when changing from passive touch to a more active loop. Good
  ball feel also includes using the right timing window, such as lifting first and then pressing
  on high-quality balls, so the return stays controlled and adaptable.
evidence_summary_source_hash: "sha256:f68e6396d37423f323098b3e0092683e46853096514ae404328bc4324646c173"
evidence_summary_generator: "codex"
detailed_definition: Ball feel is developed through variation rather than one fixed contact. Training different phases of the bounce and deliberately changing tempo builds a wider timing window and more adaptable touch.
concept_type: foundational-skill
facets: {category: [timing, touch, awareness], side: [neutral], level: [beginner, intermediate, advanced]}
difficulty: intermediate
review_status: approved
