id: concept-post-serve-recovery
slug: post-serve-recovery
label: Post-serve recovery
aliases:
  - serve recovery
  - serve plus one positioning
short_definition: Recover immediately after serving into a balanced position that matches the expected return and planned next stroke.
evidence_summary: >-
  After serving, the player should recover immediately into a close, ready position instead of
  retreating backward. On a long serve, quick recovery prevents scrambling for the next ball,
  while on a short serve the server must finish the arc and placement control before moving back
  into position. The core idea is that early recovery preserves table proximity and prevents the
  feeling of being jammed by the opponent’s return.
evidence_summary_source_hash: "sha256:ba7ff903c6054e4d9956d54683b80327bb8e55b33df06e2160a53fdbb5ccde9b"
