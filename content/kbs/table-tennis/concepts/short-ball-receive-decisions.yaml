id: concept-short-ball-receive-decisions
slug: short-ball-receive-decisions
label: Short-ball receive decisions
aliases:
  - short and half-long receive choices
  - short-ball attack selection
short_definition: Classify the return as short, half-long, or long, arrive before the useful bounce phase, and choose a push, flick, brush loop, or deeper reset according to height, depth, and spin.
evidence_summary: >-
  A short-ball receive depends on recognizing the bounce pattern and choosing the stroke while the
  ball is still at a controllable height. The main options are to flick, touch, or push, and the
  best moment is usually at the top of the bounce or just before it drops too low, because
  arriving late reduces control and raises error risk. Good spacing matters as much as technique:
  rotate first to read the ball and create room, then step in so the contact stays compact and
  controlled.
evidence_summary_source_hash: "sha256:d68b0c660ffa9f8c54c341c806727507ac229247869f3b78725cef628b3f5e94"
evidence_summary_generator: "codex"
