id: concept-weight-transfer-through-stroke
slug: weight-transfer-through-stroke
label: Weight transfer through the stroke
aliases: [right-to-left weight transfer, load then transfer, downward press rotation]
short_definition: Load the hitting-side leg, move through center during contact, and finish with weight transferred to the opposite side.
detailed_definition: "For a right-handed forehand, the sequence runs from the right leg through center toward the left. The load should include downward pressure before rotation rather than a flat turn. The amount of transfer changes by stroke: a loop generally uses a larger shift than a drive, while advanced execution becomes compact and stable."
concept_type: body-mechanic
facets: {category: [fundamentals, stroke], side: [neutral], level: [beginner, intermediate]}
difficulty: beginner
review_status: approved
