id: concept-loose-back-tight-release
slug: loose-back-tight-release
label: Loose-back, tight-release rhythm
aliases: [relax-tight rhythm, relaxed backswing]
short_definition: Keep the backhand backswing loose, then tighten explosively through the forward release.
evidence_summary: >-
  This timing pattern starts with a relaxed preparation so the racket can move freely and feel the
  ball, then tightens only near contact to add power and spin. The contrast between a loose
  backswing and a later release is what creates the explosive quality of the stroke, but the
  preparation should not be rushed too early. A strong finish matters as well, because the motion
  should stay controlled and powerful rather than collapsing after contact.
