evidence_summary: >-
  Use placement to move the opponent and lower return quality brings together several connected
  ideas. Changing placement moves the opponent, lowers return quality, and increases the quality
  of the next shot. The goal is to control and trouble the opponent, then later emphasizes speed
  and placement to give the opponent less time to react. To prioritize placement, aim at awkward
  locations, and force the opponent to move so their attack quality falls. Mindful placement,
  explicitly avoiding the forehand and returning to the backhand side for better control.
  Defensive positioning as locking down the cross-court and adjusting stance based on serve
  location and predicted reply. Steering wide serves to the opponent's backhand, jamming them, and
  placing returns deep to a targeted wing to restrict their next attack. A wider serve jams the
  opponent, forces weak returns, and makes the return harder to direct. The focus should be on
  moving the opponent, forcing movement with placement, and attacking open spots. Additional
  points reinforce the same theme. Together, these principles show how the topic is applied in
  practice while preserving the relevant distinctions and constraints.
