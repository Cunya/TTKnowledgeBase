short_definition: Using closeness for control and space for power when executing flicks, depending on the intended shot type and spin.
evidence_summary: >-
  Distance management for flicks brings together several connected ideas. Power-flick spacing and
  push-flick closeness, then summarizes that more spin or simpler landing requires being closer,
  while more power requires more space. To get closer, step forward, avoid reaching, and stay
  close to the ball for short-ball flicks. A ball too far from the body leaves too little time and
  makes side contact difficult, so it should be kept close. Staying close to heavy spin balls,
  using no backswing, and the closer the paddle is, the more stable the return becomes. To create
  space after a deep return, not stand too far back on semi-spinny balls, and step in or back
  depending on the opponent's return. Together, these principles show how the topic is applied in
  practice while preserving the relevant distinctions and constraints.
