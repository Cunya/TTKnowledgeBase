short_definition: A serve-spin mechanism where penhold players add spin with a finger snap, while shakehand players rely more on forearm opening and closing.
evidence_summary: >-
  Finger and forearm spin generation brings together several connected ideas. Extra spin comes
  from a final finger snap and this with the difficulty of finger action for shakehand players.
  Speed, lift, and arc creation to fingers and then says the forearm continues forward at contact.
  The power for the 7-to-10 motion comes from the fingers driving the racket-head rotation, not
  the wrist, and that the forearm should not be used for the initial lift. The forearm drives
  forward, then the fingers engage and lift, and that faster fingers make the ball kick more.
  Finger strength is key, fingers must initiate the wrist snap, and wrist movement should result
  from finger pressure. The snapping motion comes from the fingers and palm gripping the racket,
  not from the forearm muscle itself. Defensive pressure as finger-driven, separating thumb for
  backhand and index finger for forehand, and later states that power comes primarily from fingers
  and wrist with forearm drive. Friction comes from the arm framework and then from adding fingers
  and wrist, which makes the spin stronger. Together, these principles show how the topic is
  applied in practice while preserving the relevant distinctions and constraints.
