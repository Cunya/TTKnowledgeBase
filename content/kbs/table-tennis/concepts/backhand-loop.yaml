id: concept-backhand-loop
slug: backhand-loop
label: Backhand loop
aliases:
  - backhand topspin loop
short_definition: Coordinate spacing, backswing, and contact close enough to the body to produce a repeatable backhand topspin loop.
evidence_summary: >-
  The backhand loop is a topspin stroke that depends on letting the ball come into the body’s
  space, loading the backswing with the incoming ball, and then brushing with the right racket
  angle. Quality comes from coordinated body movement, forearm and wrist layering, and a racket
  tip that drops before rotating upward into the ball. When these elements are timed well, the
  backhand loop produces both spin and power rather than a simple lift or push.
evidence_summary_source_hash: "sha256:7f6c97f593dd43d993b728532bdc31a68c2d31de99142fcacf6d5683fe36864e"
evidence_summary_generator: "codex"
