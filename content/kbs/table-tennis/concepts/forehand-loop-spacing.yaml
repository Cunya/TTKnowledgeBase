id: concept-forehand-loop-spacing
slug: forehand-loop-spacing
label: Forehand loop spacing and contact zone
aliases: [loop distance, hand-ball distance, forehand contact zone]
short_definition: Preserve enough room from the table and body for the ball to enter a repeatable contact zone without reaching or getting jammed.
detailed_definition: Good spacing is dynamic rather than a single fixed distance. Start far enough from the table to complete the stroke, adjust with the feet to the ball's depth, and let the ball approach the lead-leg area so body rotation can transfer power without overreaching.
concept_type: principle
