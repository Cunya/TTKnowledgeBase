short_definition: A backswing that moves behind the torso rather than only to the side, helping body rotation and creating a better hitting zone.
evidence_summary: >-
  Backswing behind the body brings together several connected ideas. The racket should go behind
  the body and that this creates space and the proper hitting zone. The backswing as dropping
  toward the hip/upper thigh and hiding the racket by the right thigh rather than going straight
  back. The forehand loop backswing is behind the body and should not be from the side. The serve
  requires a drawn-back backswing with shoulder and elbow pulled behind the body, and that
  starting in the backswing position simplifies practice. The backswing should finish behind the
  body, with a specific compact position for topspin and a close-to-body position for backspin.
  After looping, the backswing should go backwards, not downwards. A huge backswing and one that
  goes behind the body as a common mistake that causes jamming and loss of control. Together,
  these principles show how the topic is applied in practice while preserving the relevant
  distinctions and constraints.
