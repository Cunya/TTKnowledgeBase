short_definition: Add a sideways component to the stroke so the ball gains arc and friction instead of moving only forward.
evidence_summary: >-
  Side component to create arc and friction brings together several connected ideas. A sideways
  component creates arc and increases friction, and ties it to hip drive and forearm swing.
  Pushing sideways with side force so the ball does not fly long and power is absorbed. Applying
  force from the outside to the inside, which is a sideways component used to generate friction.
  The lesson names 'arching' and friction must be applied promptly, with finger force and
  racket-face angle to make it effective. The ball needs a sideways component in addition to
  forward force in order to curve and generate friction. Extending the ball sideways and using a
  sideways method to increase spin and create a low arc with strong spin. The spinny loop as
  having a curved arc and contacting from the side creates the wrapping action around the ball. A
  curved path and outside-arc acceleration increase spin, and specifically describes brushing
  toward the side-front to make the ball spinnier. Additional points reinforce the same theme.
  Together, these principles show how the topic is applied in practice while preserving the
  relevant distinctions and constraints.
