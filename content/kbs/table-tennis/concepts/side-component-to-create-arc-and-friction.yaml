short_definition: Add a sideways component to the stroke so the ball gains arc and friction instead of moving only forward.
evidence_summary: >-
  Side component to create arc and friction brings together several connected ideas. A sideways
  component creates arc and increases friction, and ties it to hip drive and forearm swing.
  Pushing sideways with side force so the ball does not fly long and power is absorbed. Applying
  force sideways makes the shot more stable and creates strong spin with control. Applying force
  from the outside to the inside, which is a sideways component used to generate friction. The
  lesson names 'arching' and friction must be applied promptly, with finger force and racket-face
  angle to make it effective. The ball needs a sideways component in addition to forward force in
  order to curve and generate friction. Together, these principles show how the topic is applied
  in practice while preserving the relevant distinctions and constraints.
