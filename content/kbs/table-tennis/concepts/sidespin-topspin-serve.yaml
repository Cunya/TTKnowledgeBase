id: concept-sidespin-topspin-serve
slug: sidespin-topspin-serve
label: Sidespin–topspin serve
aliases: [side-top serve, sidespin topspin service]
short_definition: Combine sidespin with topspin in a low, fast serve that can be placed short or long to provoke an awkward attacking return.
evidence_summary: >-
  A sidespin-topspin serve combines lateral movement with forward kick, making it deceptive and
  useful for shaping the opponent's return. The core idea is that the same circular serving action
  can disguise whether the ball is loaded with topspin or backspin, while the actual brush
  direction changes on the way up or down. For long serves, the ball should be driven or punched
  more than brushed, with the deception added through the final contact and disguise.
evidence_summary_source_hash: "sha256:a5b4dac2f8e21b378ea4da3833b8a6e38b4b03662eb3b39b8bfe560e2d4fea00"
evidence_summary_generator: "codex"
concept_type: serve
facets: {category: [stroke, tactic], side: [neutral], spin: [sidespin, topspin], level: [intermediate]}
difficulty: intermediate
review_status: approved
