id: concept-relax-then-accelerate-at-contact
slug: relax-then-accelerate-at-contact
label: Relax, then accelerate at contact
aliases: [late-stage acceleration, relaxed lead-in, soft-to-fast release]
short_definition: Stay loose during preparation and the early forward swing, then accelerate briefly as the racket reaches the ball.
detailed_definition: Late acceleration preserves freedom in the arm and racket head while concentrating force near contact. Starting tense or applying force from the beginning can stiffen the stroke and disturb timing. The principle appears across both forehand and backhand technique.
concept_type: timing-cue
facets: {category: [stroke, fundamentals], side: [neutral], level: [intermediate]}
difficulty: intermediate
review_status: approved
