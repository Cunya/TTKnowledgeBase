short_definition: A serving principle where different spins are hidden behind nearly identical-looking service motions so the receiver cannot easily read the spin.
evidence_summary: >-
  Serve deception through identical motion brings together several connected ideas. Fake versus
  real motion, identical-looking motions, and deception as the core reason the serves are
  effective. The two actions should look identical and calls that the essence of the serves.
  Disguising one serve as another and making the ball appear to be one spin while behaving like
  another. Most actions are feints, the actions look identical, and the starting and ending points
  must align for deception. Opposite or identical finish motions hide the true spin and should not
  reveal the serve. The motions look identical and that both serves can finish the same way to
  confuse the opponent. Deception causes misreads and stresses making topspin and backspin serves
  look nearly identical with identical backswing and follow-through. Making the preparation look
  the same while changing serve length or spin to deceive the opponent. Additional points
  reinforce the same theme. Together, these principles show how the topic is applied in practice
  while preserving the relevant distinctions and constraints.
