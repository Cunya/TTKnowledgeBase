short_definition: A serving principle where different spins are hidden behind nearly identical-looking service motions so the receiver cannot easily read the spin.
evidence_summary: >-
  Serve deception through identical motion brings together several connected ideas. Fake versus
  real motion, identical-looking motions, and deception as the core reason the serves are
  effective. Not to reveal intentions and that the same starting motion can produce backspin,
  sidespin, or a fast serve, with the change happening at contact. The added element a feint and
  shows a two-part motion with a different finish. The two actions should look identical and calls
  that the essence of the serves. The opponent must not be able to tell it is a long serve and
  that body motion should create deception. To add fake motion and fakes at the end to make
  returns harder and reading difficult. Disguising one serve as another and making the ball appear
  to be one spin while behaving like another. Together, these principles show how the topic is
  applied in practice while preserving the relevant distinctions and constraints.
