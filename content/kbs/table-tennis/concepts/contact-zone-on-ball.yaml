id: concept-contact-zone-on-ball
slug: contact-zone-on-ball
label: Contact zone on the ball
aliases: [ball contact region, contact point on the ball, contact zone map]
short_definition: Choose which region of the ball the racket touches to control the direction and mixture of spin.
detailed_definition: This is distinct from the player's spatial contact point. Touching lower regions favors backspin, while moving toward the back or side changes the spin mixture. A repeatable serve action still produces different outcomes when its ball-contact zone changes.
concept_type: contact-mechanic
