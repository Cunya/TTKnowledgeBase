short_definition: Keep the racket face stable through backswing, contact, and follow-through; wobbling at impact causes errors and inconsistency.
evidence_summary: >-
  Racket face stability brings together several connected ideas. The racket face should not wobble
  and that stability is essential for consistency and landing hits on the table. A useful contrast
  is between brushing and flat hitting and says the wrist and forearm must act as one fixed unit,
  with the grip firm and the wrist locked. A useful contrast is between unstable snake-like
  contact and a unified one-piece action and says the arm and racket face must be locked and
  stable. Power errors to an unstable racket face and the wrist, fingers, and racket face must not
  rotate at impact. The racket cannot wobble and must remain fixed through contact for power and
  control. The back of the hand must remain firm, the wrist should be locked, and in fast rallies
  the wrist should stay stable. Together, these principles show how the topic is applied in
  practice while preserving the relevant distinctions and constraints.
