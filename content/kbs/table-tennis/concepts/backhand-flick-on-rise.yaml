id: concept-backhand-flick-on-rise
slug: backhand-flick-on-rise
label: Backhand flick on the rise
aliases: [early backhand flick, close-table flick timing]
short_definition: Close to the table, contact the backhand flick while the ball is rising to avoid being jammed.
evidence_summary: >-
  Backhand flick timing is about choosing the rising ball when close to the table instead of
  waiting until the ball crowds your body. Taking the ball on the rise creates more space for the
  stroke and makes the flick easier, especially on half-long balls that are suited to a banana
  flick. The main cue is to meet the ball early enough to stay in control without being forced
  into a cramped contact.
