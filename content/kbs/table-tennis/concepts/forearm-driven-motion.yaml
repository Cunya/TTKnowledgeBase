id: concept-forearm-driven-motion
slug: forearm-driven-motion
label: Forearm-driven motion
aliases:
  - forearm folding
  - compact forearm action
short_definition: A stroke action driven primarily by the forearm folding and unfolding, without overusing the upper arm.
evidence_summary: >-
  Forearm-driven motion brings together several connected ideas. A useful contrast is between
  compact forearm folding and forearm-driven motion and lifting the upper arm too much. To use
  mainly the forearm and then apply force forward or forward and downward for heavy spin. The
  forearm determines backswing height and that the backswing is led by the forearm. Backhand and
  forehand shapes, then directly instructs to contract the forearm and avoid moving the upper arm
  or elbow. To use the forearm to accelerate and later to retract the forearm after contact. The
  shoulder and elbow should be fixed/stable and that speed or acceleration comes from the forearm.
  The player to avoid the upper arm and use/speed up the forearm. Not to generate spin with the
  forearm in one way, then instructs the learner to fold the forearm and shows the forearm as the
  key moving part. Additional points reinforce the same theme. Together, these principles show how
  the topic is applied in practice while preserving the relevant distinctions and constraints.
