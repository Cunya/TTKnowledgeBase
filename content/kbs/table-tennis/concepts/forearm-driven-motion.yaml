id: concept-forearm-driven-motion
slug: forearm-driven-motion
label: Forearm-driven motion
aliases:
  - forearm folding
  - compact forearm action
short_definition: A stroke action driven primarily by the forearm folding and unfolding, without overusing the upper arm.
evidence_summary: >-
  Forearm-driven motion brings together several connected ideas. A useful contrast is between
  compact forearm folding and forearm-driven motion and lifting the upper arm too much. To use the
  wrist to drive the forearm and that this compact action improves consistency for brushing. To
  use the forearm to accelerate and later to retract the forearm after contact. The stroke relies
  on the wrist and forearm to generate the pull, and later describes using the forearm with the
  shoulder and elbow lowered. Not to generate spin with the forearm in one way, then instructs the
  learner to fold the forearm and shows the forearm as the key moving part. To use the forearm and
  upper arm separately, make the arm feel like a whip, and not let the whole arm move as one unit.
  The upper arm and elbow drive forward and the forearm snaps to finish the motion, while the
  backswing opens the forearm rather than pulling the elbow back. The forearm drops, opens the
  arm, and then adds speed in the second phase; this is presented as the core motion behind the
  shot. Additional points reinforce the same theme. Together, these principles show how the topic
  is applied in practice while preserving the relevant distinctions and constraints.
