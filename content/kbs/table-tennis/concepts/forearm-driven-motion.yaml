id: concept-forearm-driven-motion
slug: forearm-driven-motion
label: Forearm-driven motion
aliases:
  - forearm folding
  - compact forearm action
short_definition: A stroke action driven primarily by the forearm folding and unfolding, without overusing the upper arm.
evidence_summary: >-
  Forearm-driven motion brings together several connected ideas. A useful contrast is between
  compact forearm folding and forearm-driven motion and lifting the upper arm too much. To use
  mainly the forearm and then apply force forward or forward and downward for heavy spin. The
  forward rush spin comes from forearm swing. To use the forearm to accelerate and later to
  retract the forearm after contact. The shoulder and elbow should be fixed/stable and that speed
  or acceleration comes from the forearm. The player to avoid the upper arm and use/speed up the
  forearm. To separate the forearm and upper arm and use a whip-like forearm action for power. To
  use the forearm and upper arm separately, make the arm feel like a whip, and not let the whole
  arm move as one unit. Additional points reinforce the same theme. Together, these principles
  show how the topic is applied in practice while preserving the relevant distinctions and
  constraints.
