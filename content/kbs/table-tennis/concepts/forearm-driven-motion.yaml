short_definition: A stroke action driven primarily by the forearm folding and unfolding, without overusing the upper arm.
evidence_summary: >-
  Forearm-driven motion brings together several connected ideas. A useful contrast is between
  compact forearm folding and forearm-driven motion and lifting the upper arm too much. Players to
  open the arm, open the paddle head, and open the forearm and body in sequence. To use mainly the
  forearm and then apply force forward or forward and downward for heavy spin. To use the wrist to
  drive the forearm and that this compact action improves consistency for brushing. The forearm
  determines backswing height and that the backswing is led by the forearm. The forward rush spin
  comes from forearm swing. Backhand and forehand shapes, then directly instructs to contract the
  forearm and avoid moving the upper arm or elbow. To use the forearm to accelerate and later to
  retract the forearm after contact. Together, these principles show how the topic is applied in
  practice while preserving the relevant distinctions and constraints.
