id: concept-forehand-loop-practice-progression
slug: forehand-loop-practice-progression
label: Forehand loop practice progression
aliases: [loop drills, low-power loop practice, loop shadow practice]
short_definition: Build the loop from coordinated shadow movement to stable fixed-point strokes at moderate effort before adding speed, variation, and match pressure.
evidence_summary: >-
  Forehand loop practice should begin at low intensity so the motion becomes stable and repeatable
  before power is added. A useful progression is to build feel and timing with controlled loops,
  then add footwork and variability, and only later increase to full power once the player can
  adjust the arc and contact reliably against different ball qualities.
evidence_summary_source_hash: "sha256:5139cf5d17529bdec162e759798e192d4cfc999f2e4c56b40c781e20190603e1"
evidence_summary_generator: "codex"
detailed_definition: Early practice should reduce difficulty so the player can stabilize timing, contact, and body-arm structure. Shadow practice develops coordination without ball pressure; fixed-point feeding at roughly 30–50 percent effort makes the movement repeatable. After that base is stable, practice different contact timings and introduce variations in pace, height, depth, and placement before adding match pressure.
concept_type: drill
facets: {category: [practice, progression], side: [forehand], spin: [topspin], level: [beginner]}
difficulty: beginner
review_status: approved
