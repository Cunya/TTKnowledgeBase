short_definition: A hook serve needs a curved arm and body path, not a simple forward-then-downward swing, so the force direction can wrap around the ball.
evidence_summary: >-
  Curved serve trajectory brings together several connected ideas. The serve's trajectory as a
  curved motion driven by body rotation, explicitly rejecting a straight forward-then-downward
  path. The ball as fast and curving, which directly supports the curved trajectory concept. A
  distinct sideways curve and a heavy arc as part of the serve's effect and disguise. A curved
  flick, a long arc, and a curved trajectory. The serve must curve and follow an arc, not a linear
  forward-downward path. A useful contrast is between straight balls and balls that curve to the
  side and become difficult to return. High arc, floating arc, and curved brushing/trajectory
  descriptions as part of serve reading and spin generation. The pulling feel makes the ball curve
  aggressively and it with a high, predictable bounce from more forceful chopping. Additional
  points reinforce the same theme. Together, these principles show how the topic is applied in
  practice while preserving the relevant distinctions and constraints.
