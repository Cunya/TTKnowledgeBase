short_definition: Use forearm acceleration as the main power source to create maximum spin and proper arc over the table.
evidence_summary: >-
  Forearm acceleration brings together several connected ideas. Forearm acceleration as of maximum
  spin and the loop as forearm-dominant. Power comes from maintaining the brushing feeling and
  speeding up the forearm swing. The elbow is the pivot, the upper arm should not move, and the
  forearm is the main of power. The power comes mainly from the forearm and that it should
  accelerate at contact. The secondary acceleration is accomplished by the forearm and that this
  is primarily forearm acceleration. To accelerate the forearm forward, snap the forearm after the
  upper arm stops, and use forearm drive into the ball. Force should come from the forearm, with
  the elbow used as an axis and the forearm accelerated for speed and quality. Brushing must be
  combined with a forward-moving forearm, and demonstrates the forearm moving forward first while
  the wrist snaps at contact. Additional points reinforce the same theme. Together, these
  principles show how the topic is applied in practice while preserving the relevant distinctions
  and constraints.
