id: concept-forehand-drive
slug: forehand-drive
label: Forehand drive
aliases:
  - forehand counterdrive
  - drive hit
short_definition: Meet a suitable ball with a compact forward stroke, stable racket face, and contact timed near the top of the bounce.
evidence_summary: >-
  The forehand drive is a compact, direct stroke built around forward impact rather than a large
  looping action. The swing starts from the side with a controlled backswing, a level forearm, and
  a firm wrist so the ball is met cleanly in front of the body. It can also handle heavy backspin
  through solid contact, but its timing window is short and becomes even tighter when standing
  close to the table.
