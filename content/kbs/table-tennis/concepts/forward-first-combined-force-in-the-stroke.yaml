short_definition: Generate power by moving forward first and then adding the swing, rather than lifting straight upward or using an isolated arm motion.
evidence_summary: >-
  Forward-first combined force in the stroke brings together several connected ideas. Power comes
  from combining forward motion with the swing and against a purely upward action. A useful
  contrast is between lifting upward and pressing forward and says the body rotates first, then
  the wrist adds spin. A useful contrast is between purely upward force and the need for both
  forward and upward force. A useful contrast is between forward force and upward force and says
  the forearm direction should be forward, not upward. The forearm path should not be too upward
  and specifies the correct force direction as forward first, then upward. On 'combining forces'
  and the ball and racket moving forward together create a powerful collision, followed by a
  forearm snap. The swing must be forward-then-up, not up-then-forward, and that heavy spin may
  require a bit more lift after forward contact. Every shot must have a forward component and that
  loops need to drive through the ball to create a long enough trajectory. Additional points
  reinforce the same theme. Together, these principles show how the topic is applied in practice
  while preserving the relevant distinctions and constraints.
