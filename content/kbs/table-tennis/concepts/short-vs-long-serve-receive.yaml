id: concept-short-vs-long-serve-receive
slug: short-vs-long-serve-receive
label: Short versus long serve receive
aliases:
  - receive by bounce phase
  - long serve push adjustment
short_definition: Choose the receive action from serve depth and bounce phase, moving in for short balls and allowing appropriate space for longer balls.
evidence_summary: >-
  Short and long serves demand different receive spacing, timing, and swing length, so the first
  task is judging the bounce correctly. Short balls are handled close to the table with compact
  contact, while long balls usually need a fuller backswing and a different forward commitment; if
  the judgment is wrong, the receive breaks down. A practical decision rule is to take dropping
  balls early, use the peak for longer pushes or chop-pushes, and adjust contact and weight so the
  stroke matches the incoming length and curve.
evidence_summary_source_hash: "sha256:b95e662ad5e5d45191615c39931072b2d7b4f18e297005769d12553e7f18fbba"
evidence_summary_generator: "codex"
