id: concept-backspin-serve-under-ball-contact
slug: backspin-serve-under-ball-contact
label: Under-ball contact for backspin serve
aliases: [bottom contact, heavy backspin contact]
short_definition: Brush under the ball—rather than its back—to produce heavy backspin on the serve.
evidence_summary: >-
  A common error in backspin serve contact is striking too high on the ball, which pops it up
  instead of letting the racket grip and drive the ball downward. Better contact is on the lower
  half or lower middle of the ball, where the brush can create heavy backspin and more controlled
  landing, while upper-half contact tends to add topspin instead. The key is not to hit directly
  behind or underneath the ball in a flat way, but to shape the contact so the racket can work
  under and around it with minimal extra motion.
evidence_summary_source_hash: "sha256:04b855c2ae6431dcd7b104604292828f0323b0d0960c20b04a4cf8996b432eab"
evidence_summary_generator: "codex"
