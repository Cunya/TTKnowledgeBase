id: concept-push-spin-power-progression
slug: push-spin-power-progression
label: Push–spin–power progression
aliases:
  - push to loop progression
short_definition: 'Develop rally control in stages: stabilize the push, add a safer spin loop, then progress to a stronger power loop.'
evidence_summary: >-
  The progression begins with stable pushing and then moves into slow loops with heavy spin and a
  lower contact point. Only after contact is consistent and push errors have been removed should
  explosive power looping be added. This sequence builds control first, then spin quality, and
  finally power, while also teaching how changes in push spin affect the difficulty of the return.
