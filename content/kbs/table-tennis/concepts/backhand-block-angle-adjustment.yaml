short_definition: On the backhand, adjusting racket angle to control whether the ball arcs over the net or gains more spin, especially because the stroke is compact.
evidence_summary: >-
  Backhand block angle adjustment brings together several connected ideas. States that if the ball
  tends to go into the net, open the backhand racket angle more. They describe switching to a more
  vertical punch block or quick counter and keeping the racket angled forward and slightly
  downward to pin the ball down. Using the racket head to block and adjusting the backhand-side
  racket angle. The exact arm shape and it controls the ball's arc against heavy spin. The
  receiver to keep the racket open, vertical, or flat depending on the serve angle, which is the
  core of backhand angle adjustment even though the examples are framed as pushes. Them to keep
  the racket angle closed and absorb the ball's energy in the block. Compact blocking/countering,
  using opponent pace, and avoiding excess arc on the block. To use the body weight on a wide
  backhand, keep the racket in front like a rebound board, and later raises the racket and closes
  the angle when the ball is slower and spinny. Together, these principles show how the topic is
  applied in practice while preserving the relevant distinctions and constraints.
