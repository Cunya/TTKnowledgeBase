short_definition: Reducing stroke and torso size to stay linked to the next shot during fast rally exchanges.
evidence_summary: >-
  Compact stroke under fast rallies brings together several connected ideas. Fast rallies with
  compact body movement, says there is no time to turn the waist, and compactness for linking to
  the next shot. Fast balls require body coordination to prevent form from scattering. A drill to
  open the forearm, then shorten the motion by a third or half to make it more compact. Faster
  backswing comes from a more compact body, that the whole body must match the serve frequency,
  and that hand-only speed is not enough. A compact finish, a braking action at contact, and a
  quick finish after contact to avoid sending the ball long. The receive backswing must be much
  more compact and shorter than a normal rally loop. The backhand is compact and that fast pace
  limits extra movement or turning time. To meet the ball early with a quick, compact stroke and
  explicitly notes that excessive spin or power is unnecessary. Additional points reinforce the
  same theme. Together, these principles show how the topic is applied in practice while
  preserving the relevant distinctions and constraints.
