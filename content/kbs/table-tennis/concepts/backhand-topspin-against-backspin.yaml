id: concept-backhand-topspin-against-backspin
slug: backhand-topspin-against-backspin
label: Backhand topspin against backspin
aliases:
  - backhand loop underspin
short_definition: Lower and organize the body, then use a friction-led upward and forward action to lift backspin with the backhand.
evidence_summary: >-
  Against backspin on the backhand, the stroke should rely on rotational friction rather than a
  simple low-to-high lift, because that creates a more stable topspin action. When the incoming
  spin is heavy, the body should drop and tilt slightly sideways or downward to create arc and
  lift, while the arm supports the loop so the brushing action can keep pace. If the swing becomes
  too large or the brushing cannot match the spin, the ball goes long and a fuller looping
  solution may be needed.
evidence_summary_source_hash: "sha256:22c78f2580a044aef2591e77e1097af2c5114fec917ef8f14857e0340a9f4daa"
evidence_summary_generator: "codex"
