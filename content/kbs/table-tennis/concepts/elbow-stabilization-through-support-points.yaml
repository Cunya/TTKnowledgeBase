id: concept-elbow-stabilization-through-support-points
slug: elbow-stabilization-through-support-points
label: Elbow stabilization through support points
aliases:
  - keep the elbow fixed
  - elbow needs to stay fixed
  - press down the elbow so it doesn't wobble
  - point the elbow to the lower right
  - left hand works as a stabilizer
short_definition: Stabilize the elbow by fixing its position, keeping the shoulder firm, and using temporary left-hand support so the stroke does not wobble.
evidence_summary: >-
  Elbow stabilization through support points brings together several connected ideas. The elbow
  must stay fixed, the shoulder must stay firm, and the elbow should brake and stop as the forearm
  retracts. The wrist, forearm, or elbow bending makes power generation difficult and explicitly
  says to support the elbow. The elbow acts as a pivot, should remain stable, should not drift,
  and that moving it with the arm causes jamming. Keeping the elbow fixed increases rotation speed
  and that the elbow should act as a pivot point. To use the upper arm and elbow as a stable pivot
  point and shows them staying still. The elbow is the most important joint, should stay
  positioned, and must not move with the swing. The elbow should not fly up or point backward and
  that racket-angle changes should come from the wrist, not elbow movement. Stable elbow position
  to correct contact and instability turns the stroke into a push or lift. Additional points
  reinforce the same theme. Together, these principles show how the topic is applied in practice
  while preserving the relevant distinctions and constraints.
