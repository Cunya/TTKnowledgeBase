short_definition: Stabilize the elbow by fixing its position, keeping the shoulder firm, and using temporary left-hand support so the stroke does not wobble.
evidence_summary: >-
  Elbow stabilization through support points brings together several connected ideas. The elbow
  must stay fixed, the shoulder must stay firm, and the elbow should brake and stop as the forearm
  retracts. The elbow as the pivot and the forearm should rotate around it for a smooth backhand
  stroke. How to stabilize the elbow with the left hand, pressing in the middle and directing
  force downward. The elbow acts as a pivot, should remain stable, should not drift, and that
  moving it with the arm causes jamming. The elbow tucked in prevents closing the racket angle and
  makes short balls difficult. Keeping the elbow fixed increases rotation speed and that the elbow
  should act as a pivot point. To use the upper arm and elbow as a stable pivot point and shows
  them staying still. The elbow drops with the forearm and recommends keeping the elbow set in
  place. Additional points reinforce the same theme. Together, these principles show how the topic
  is applied in practice while preserving the relevant distinctions and constraints.
