evidence_summary: >-
  Compact motion for heavy backspin brings together several connected ideas. Heavy backspin
  requires a very small, compact movement and it as inch power rather than a large slow motion.
  Compact motion as one of the three keys to maximum friction and the brushing action itself
  should be very small. To eliminate a full backswing, use a high slow arc, and keep the motion
  compact to improve spin. Better push quality to staying close to the ball and concentrating
  acceleration late in a compact motion. The swing must be compact, smaller motions counteract
  incoming spin better, and spinny balls require smaller movement. The serve should be compact,
  with a small range of motion and abrupt stopping points. He contrasts a high backswing with a
  low, compact motion and the compact version stays spinny even with relaxed motion. Extremely
  spinny balls should be handled with minimal body rotation, a compact body movement, and a
  smaller but fast stroke. Additional points reinforce the same theme. Together, these principles
  show how the topic is applied in practice while preserving the relevant distinctions and
