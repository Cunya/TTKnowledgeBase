short_definition: A serve-training principle where the motion is kept compact and stopped immediately at contact to concentrate force and control spin.
evidence_summary: >-
  Compact motion and stop brings together several connected ideas. The player to stop at contact,
  keep the motion compact, and avoid a long brushing follow-through because it scatters force. A
  useful contrast is between bigger swings and a more compact swing and says compact motion
  improves table percentage and consistency while moving. The motion is very visible and therefore
  must be kept compact and not too big. A useful contrast is between a compact swing and a huge,
  wild swing and says the ball still has enough power with a short backswing and limited body
  movement. For compact stroke mechanics, no backswing on the block, and controlled power rather
  than all-out swings. The whole body movement becomes compact and the power should be sharply
  focused at the end of the stroke. A very compact motion for flicks, especially when playing
  safely close to the ball. To shorten the backswing when moving forward and keep the stroke
  compact. Additional points reinforce the same theme. Together, these principles show how the
  topic is applied in practice while preserving the relevant distinctions and constraints.
