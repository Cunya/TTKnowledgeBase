evidence_summary: >-
  Body rotation through the stroke brings together several connected ideas. Rotating the body and
  explicitly says the motion is driven by the body. Adding body rotation, and involving other body
  parts can make the contact point wrong and break the stroke. To avoid waist rotation and keep
  the body still during the serve. Body twisting and explosive rotation, along with shifting the
  center of gravity onto the right leg and driving forward. Torso/hip rotation in sync with the
  arm and the need to coil before executing the shot. The stroke starting sideways, rotating
  forward, and keeping body rotation on a horizontal plane. You must rotate your body, turn
  sideways, then step in and swing. The forehand requires opening the body, enough rotation space,
  and rotating the body before stepping in. Additional points reinforce the same theme. Together,
  these principles show how the topic is applied in practice while preserving the relevant
  distinctions and constraints.
