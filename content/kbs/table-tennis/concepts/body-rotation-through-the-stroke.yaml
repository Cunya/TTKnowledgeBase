short_definition: Using torso and body rotation to drive the stroke, then returning to neutral after the shot.
evidence_summary: >-
  Body rotation through the stroke brings together several connected ideas. Rotating the body and
  explicitly says the motion is driven by the body. Body power should go forward and frames the
  feeling as rotate, push, rotate, push. Adding body rotation, and involving other body parts can
  make the contact point wrong and break the stroke. Not to face the table directly, but to turn
  sideways and rotate the waist to create room. To avoid waist rotation and keep the body still
  during the serve. Rotating the waist, turning the body, and against failing to twist the waist
  during the transition to looping. Body twisting and explosive rotation, along with shifting the
  center of gravity onto the right leg and driving forward. To pivot, rotate the hips, and let the
  hip guide the shot, engaging upper arm and forearm. Additional points reinforce the same theme.
  Together, these principles show how the topic is applied in practice while preserving the
  relevant distinctions and constraints.
