  and loop-driving and explains that loop driving uses a larger body rotation range, with stepping
  across and rotating while bowing. The body won't move forward without pivoting, then instructs
  rotating the hips and shoulders. Additional points reinforce the same theme. Together, these
  principles show how the topic is applied in practice while preserving the relevant distinctions
