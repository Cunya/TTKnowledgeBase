id: concept-compact-response-to-fast-ball
slug: compact-response-to-fast-ball
label: Compact response to a fast ball
aliases:
  - no-backswing response
  - compact receive
short_definition: Reduce or remove the backswing when time is limited, using the incoming pace and a compact contact action.
evidence_summary: >-
  A fast ball demands a very small, compact receive motion because the available reaction time is
  limited. The racket should stay in front with no big backswing, the wrist kept controlled, and
  the forearm used to lift or guide the ball onto the table. The contact is taken on the descent
  with a closed angle and a forward drive, so the ball is handled by thin friction and direct
  forward action rather than a large brushing swing.
evidence_summary_source_hash: "sha256:f8f9c3593ee7af3eb7ad88074e1299ffcdf666d13ba7d3738f947cf4a8e1f81a"
evidence_summary_generator: "codex"
concept_type: timing
facets:
