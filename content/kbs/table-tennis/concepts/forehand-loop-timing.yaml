id: concept-forehand-loop-timing
slug: forehand-loop-timing
label: Forehand loop timing and rhythm
aliases: [loop timing, wait-loop rhythm, late acceleration]
short_definition: Time the forehand loop by waiting for the ball, staying loose through preparation, and accelerating at contact.
detailed_definition: Incoming pace changes the tempo, but the player still avoids rushing the backswing. The body and racket prepare with the ball, remain relaxed, and release speed late at the chosen contact point.
concept_type: principle
facets:
  category: [timing, stroke]
  side: [forehand]
  spin: [topspin]
  level: [intermediate]
difficulty: intermediate
review_status: approved
