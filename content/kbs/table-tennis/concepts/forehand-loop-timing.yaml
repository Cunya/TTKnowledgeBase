id: concept-forehand-loop-timing
slug: forehand-loop-timing
label: Forehand loop timing and rhythm
aliases: [loop timing, wait-loop rhythm, late acceleration]
short_definition: Time the forehand loop by waiting for the ball, staying loose through preparation, and accelerating at contact.
evidence_summary: >-
  Forehand loop timing is built around matching the stroke to the incoming ball while preserving a
  consistent rhythm across rallies and repeated loops. Preparation should begin only after the
  opponent's contact and the ball's curve are clear, with the ball contacted later for easier
  looping and with the swing shape adjusted according to speed, spin, and whether the ball is
  rising or falling.
evidence_summary_source_hash: "sha256:ee470eb23870311fc526f6dbec86d7063fc7ebe59392e5cc1b94318e4dbc6a86"
evidence_summary_generator: "codex"
detailed_definition: Incoming pace changes the tempo, but the player still avoids rushing the backswing. The body and racket prepare with the ball, remain relaxed, and release speed late at the chosen contact point.
concept_type: principle
facets:
  category: [timing, stroke]
  side: [forehand]
  spin: [topspin]
  level: [intermediate]
difficulty: intermediate
review_status: approved
