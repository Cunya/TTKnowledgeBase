id: concept-ready-position
slug: ready-position
label: Ready position
aliases:
  - ready stance
short_definition: A balanced neutral stance used to react and recover between strokes.
evidence_summary: >-
  The ready position is the neutral recovery stance that lets the player judge the next ball and
  move efficiently into the correct response. It should be low, compact, and relaxed, with the
  center of gravity forward and the racket held above the table so the player can move quickly.
  After serving or pushing, failing to return to this posture is a common error because active
  recovery is essential for the next shot.
evidence_summary_source_hash: "sha256:ec3805b5417abfaa88b6293ec9bb987c3287683c0ab144f721be60337ab909ec"
evidence_summary_generator: "codex"
detailed_definition: Keep the knees bent, weight toward the front of the feet, and return to the stance after each stroke.
concept_type: fundamental
facets:
  category: [fundamentals]
  side: [neutral]
  level: [beginner]
difficulty: beginner
review_status: approved
