id: concept-opponent-targeting
slug: opponent-targeting
label: Opponent targeting
aliases:
  - 70–30 targeting
  - strength and weakness reading
short_definition: Direct most play toward a reliable weakness while retaining enough variation to prevent anticipation.
evidence_summary: >-
  Opponent targeting begins with identifying both the opponent’s weaker side and their spin
  preference, then using that information to build a pressure pattern. Good placement is not about
  repeatedly hitting to the same safe area, but about moving the opponent between forehand,
  middle, and backhand so they cannot settle into comfortable replies. When one pattern stops
  working, such as strong backspin exchanges, the solution is to change serve type and placement
  quickly to create a better opening for attack.
evidence_summary_source_hash: "sha256:473299efa29cc6cbf03c16e1c246174006b7c23b20c1ae84bb64192a47818ffd"
