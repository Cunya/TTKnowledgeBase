short_definition: Keeping a firm, tight grip on the racket during blocking so spinny balls can be controlled.
evidence_summary: >-
  Firm grip during block brings together several connected ideas. A firm grip is necessary to
  control spinny blocks and rejects a soft, relaxed grip. You cannot have a loose grip and must
  grip the racket firmly. Against gripping tightly during defense and to keep it firm. A useful
  contrast is between a relaxed brushing grip and a deep tight grip for hitting, and says pure hit
  or block needs stability and a tight grip. To grip firmly, lock the wrist, and keep the racket
  face stable during blocking. A hollow grip causes wobble and instructs the player to secure the
  racket firmly, including thumb-index pinching. Together, these principles show how the topic is
  applied in practice while preserving the relevant distinctions and constraints.
