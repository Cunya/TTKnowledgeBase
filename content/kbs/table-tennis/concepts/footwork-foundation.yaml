  point is footwork, with full step-in and a two-step approach to cover difficult short forehand
  balls. Footwork failure to backing up and recommends setting the feet and staying positioned to
  attack or push effectively. Additional points reinforce the same theme. Together, these
  principles show how the topic is applied in practice while preserving the relevant distinctions
  and constraints.
