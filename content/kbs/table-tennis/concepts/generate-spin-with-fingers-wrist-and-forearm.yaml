evidence_summary: >-
  Generate spin with fingers, wrist, and forearm brings together several connected ideas. Friction
  to the fingers and wrist and acceleration to the forearm, then repeats that this creates strong
  spin and control. Fingers are especially important, that high-level players use fingers to
  control final friction, and that without finger action the loop is empty. Wrist flick and finger
  friction create the serve spin, and to use fingers and wrists rather than the arm. Finger snap,
  relaxed grip, and rapid acceleration at contact to massive spin. The loop drive is powered by
  specific fingers and that gripping should only happen at the end of the follow-through. Fingers
  start the spin, the arm/body supply power, and the wrist should not be the main driver of spin
  production. Finger pressure, thumb-index coordination, and forearm motion generate the push's
  power and spin. A useful contrast is between full-body action and a contact-focused finger snap
  and says the force comes from friction, not bigger arm motion. Additional points reinforce the
  same theme. Together, these principles show how the topic is applied in practice while
  preserving the relevant distinctions and constraints.
