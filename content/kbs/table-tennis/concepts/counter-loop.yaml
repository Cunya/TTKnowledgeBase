id: concept-counter-loop
slug: counter-loop
label: Counter-loop
aliases:
  - counterloop
  - loop against topspin
short_definition: Use the opponent's topspin and timing while adding a compact forward-and-brushing action to counter-loop the next ball.
evidence_summary: >-
  Counter-looping is presented as a patient topspin exchange rather than a rushed reply. Against
  an incoming topspin ball, the player slows the rhythm and creates a clear pause, giving the body
  time to rotate and build power before the forward-and-brushing action. The approach also suits a
  strong player who can extend rallies and trade topspin attacks, using physical solidity and
  endurance as part of the tactic. The accompanying demonstrations reinforce the same timing
  lesson: feel the rhythm, wait for the right moment, and then commit to the stroke.
concept_type: stroke-variation
facets:
  category:
    - stroke-variation
  side:
    - neutral
  level:
    - intermediate
difficulty: intermediate
review_status: approved
