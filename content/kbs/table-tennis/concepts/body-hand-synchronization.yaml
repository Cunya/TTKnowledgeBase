id: concept-body-hand-synchronization
slug: body-hand-synchronization
label: Body-hand synchronization
aliases: [connected stroke, synchronized stop, decomposed power chain]
short_definition: Coordinate body, arm, wrist, and fingers so power is transferred in sequence without the stroke disconnecting.
detailed_definition: Connection does not mean moving everything as one rigid block. A rally stroke should stop body and hand together, while a serve may deliberately sequence smaller links—fingers, wrist, forearm, then upper arm—to accelerate the racket.
concept_type: coordination
facets: {category: [coordination, kinetic-chain], side: [neutral], level: [intermediate]}
difficulty: intermediate
review_status: approved
