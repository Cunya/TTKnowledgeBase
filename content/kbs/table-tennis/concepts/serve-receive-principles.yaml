id: concept-serve-receive-principles
slug: serve-receive-principles
label: Serve-receive principles
aliases:
  - receive rhythm
  - mirror principle
short_definition: Match the serve's rhythm and spin direction with a compact action, choosing timing that reduces the spin's effect.
evidence_summary: >-
  Good serve receive begins with judging the quality and speed of the incoming serve, then
  matching tempo to it with small, rhythmic movements rather than large swings. Slower or softer
  serves call for a slower rhythm, while quicker serves require a faster one, and the receiver
  should borrow, add, or redirect power with the body leading instead of forcing the ball. When
  the serve is uncertain, a neutral receive that starts more vertically and then flattens toward
  the centerline is a safe default, and training should still include attacking receives even at
  the cost of short-term errors.
evidence_summary_source_hash: "sha256:19576f4dce0b4774af15b500df5e7e8e98d2308c37f044d08f192086084c43d1"
evidence_summary_generator: "codex"
concept_type: receive
facets:
