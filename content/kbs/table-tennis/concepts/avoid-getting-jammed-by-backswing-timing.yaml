short_definition: A too-low or too-large backswing makes the ball arrive before the stroke is ready, causing late contact and errors on serve receive.
evidence_summary: >-
  Avoid getting jammed by backswing timing brings together several connected ideas. Getting jammed
  as a backswing/timing problem rather than a spin problem, especially on fast serves and backspin
  returns. Many players do not pull back enough, fear getting jammed, and should practice
  barehanded to complete the full motion. Pulling the arm early or making the backswing too big
  causes players to feel jammed, especially against fast balls. The backswing-turn-swing pattern
  will 'jam yourself up within two shots,' directly matching the concept. Getting jammed as the
  first common problem and directly links it to standing too close to the table. Square entry and
  late racket drop cause jamming and that the hand should already be dropping as the foot steps
  into position. Standing too close restricts backswing and body rotation, causes jamming, and
  recommends maintaining about one arm's length from the table. Against excessive backswing,
  keeping the racket too close to the body, and position as jammed. Additional points reinforce
  the same theme. Together, these principles show how the topic is applied in practice while
  preserving the relevant distinctions and constraints.
