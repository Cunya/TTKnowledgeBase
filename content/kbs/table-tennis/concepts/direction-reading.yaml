id: concept-direction-reading
slug: direction-reading
label: Direction reading
aliases:
  - delayed commitment
  - read before moving
short_definition: Delay commitment long enough to read the opponent's direction, then move decisively into the selected position.
evidence_summary: >-
  Direction reading must happen before the stroke is committed, because early movement without
  clear information leads to rushed errors. The player should watch the opponent and the ball
  first, then move and swing only after the direction and spin are understood. When spin is
  uncertain, the safest response is to stay forward in intent and adjust the movement based on
  what has been read.
evidence_summary_source_hash: "sha256:ef9bc8dfd4133b2ce4119e54404ab9c553f480ba9fb91d7e1ad1b4e631d47622"
evidence_summary_generator: "codex"
