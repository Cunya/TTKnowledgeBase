id: concept-brush-then-accelerate
slug: brush-then-accelerate
label: Brush then accelerate
aliases:
  - first brush, then accelerate
  - brush and then finish with acceleration
short_definition: For looping, the stroke should brush the ball first and then accelerate through the contact.
evidence_summary: >-
  Brush then accelerate brings together several connected ideas. The sequence: brush the ball,
  then accelerate. Brushing is the second key element and flat hitting backspin is not acceptable.
  Looping is about friction first and power second, and later summarizes the stroke as 'first
  brush, then drive through.' The solution is to counter with your own spin and that brushing the
  ball solves everything. The talk repeatedly frames spin generation as light brushing contact
  followed by acceleration, including the explicit phrasing 'brush, then accelerate' and 'first
  brush... then accelerate'. The brush must happen while driving forward and that the motion
  should remain continuous through contact and after the brush. Brushing contact as the key to
  friction, spin, and control, and links it to a thinner contact on the ball. To first grip/brush
  the ball to generate spin, then add a bit of forward impact, and finally create the arc by
  rolling the ball. Additional points reinforce the same theme. Together, these principles show
  how the topic is applied in practice while preserving the relevant distinctions and constraints.
