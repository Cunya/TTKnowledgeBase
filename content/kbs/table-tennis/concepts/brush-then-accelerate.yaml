  two-stage motion where the first stage is for friction and the second stage is a forward
  acceleration. The action as gripping/brushing first and accelerating afterward. Additional
  points reinforce the same theme. Together, these principles show how the topic is applied in
  practice while preserving the relevant distinctions and constraints.
