  Backhand arc trajectory brings together several connected ideas. A useful contrast is between a
  loop's arc and a push's straight line and explains that all good backhand techniques have an arc
  or semi-circle path. The rip must create an arc, describing clock-face and fan-like paths. The
  instructor compares the motion to drawing a sword, emphasizes a continuous forward arc, and the
  racket head must snap through. The backhand as drawing a circle and then a small arc, with a
  bigger arc for slower balls and a smaller forearm-only arc for faster balls. The motion is
  described as a natural arc with the racket head dropping then swinging up, and you need to
  create an arc. Both wings follow an outside-in arc and that the backhand needs a small outside
  arc. Arc awareness, describes the racket moving like a fan, and the trajectory follows the edge
  of an opening fan. Together, these principles show how the topic is applied in practice while
  preserving the relevant distinctions and constraints.
