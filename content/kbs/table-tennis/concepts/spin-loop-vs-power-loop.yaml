id: concept-spin-loop-vs-power-loop
slug: spin-loop-vs-power-loop
label: Spin loop versus power loop
aliases: [high-arc loop, safe loop, power loop selection]
short_definition: Choose the balance of brush, impact, arc, and forward speed according to the incoming ball and acceptable risk.
detailed_definition: "A high-arc spin loop adds clearance and consistency; a power loop uses a more favorable contact height and greater forward impact. These are points on a continuum: brushing manages arc and incoming spin, while forward drive manages depth and speed."
concept_type: tactic
facets: {category: [stroke-selection, consistency], side: [forehand], spin: [topspin], level: [intermediate]}
difficulty: intermediate
