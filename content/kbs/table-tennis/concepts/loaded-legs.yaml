id: concept-loaded-legs
slug: loaded-legs
label: Ground connection and loaded legs
aliases: [loaded-spring stance, engaged legs, body-ground connection]
short_definition: Keep the legs engaged and connect to the floor so force can travel from the ground into the stroke.
evidence_summary: >-
  Loaded legs mean staying low, grounded, and spring-like so the body can transfer force without
  locking up. The stance should allow weight to settle into the legs, especially the right leg
  when appropriate, while the trunk remains compact enough to adjust to the incoming ball. This
  leg loading creates stability and makes it easier to push instantly into the stroke, whereas
  stiff legs reduce movement and weaken power transfer.
evidence_summary_source_hash: "sha256:9bbfe8b07a2cd4e1c3cc84d55c832a1ef5485f46b9819a0e52e3de8a435786e2"
evidence_summary_generator: "codex"
detailed_definition: Ground connection is not limited to rally strokes. The same principle appears in serving, where weight transfer and a stomp can multiply the force delivered to the racket.
concept_type: body-mechanics
facets: {category: [stance, power, kinetic-chain], side: [neutral], level: [beginner, intermediate]}
difficulty: beginner
review_status: approved
