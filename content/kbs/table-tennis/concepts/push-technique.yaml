id: concept-push-technique
slug: push-technique
label: Push technique
aliases:
  - compact push
  - short push action
short_definition: Keep the push compact, close to the ball, and supported by an appropriate racket angle rather than a large backswing.
evidence_summary: >-
  A good push uses a slightly upright racket angle, compact forward-and-slightly-downward motion,
  and firm contact under or behind the ball. The stroke should be placement-first and controlled,
  with body weight and a concise action creating the main effect rather than a loose wrist or
  overly flat face. Because the push is a high-frequency match shot, it must be treated seriously
  and executed with consistency, spin, and enough compact force to be effective.
