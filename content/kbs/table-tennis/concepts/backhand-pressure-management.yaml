short_definition: When the opponent presses the backhand, the player must stabilize, adjust to the incoming shot, and avoid forcing power that will end in net errors.
evidence_summary: >-
  Backhand pressure management brings together several connected ideas. Pressure, lack of space,
  and net errors on the backhand. The backhand example stresses not pulling back too much, not
  going too low, and staying below the ball without being too high. Pressure on forehand/backhand
  play and to keep the ball low and stay stable under pressure. Staying low, keeping center of
  gravity stable, engaging the legs, and using compact motion on fast returns. A set wrist
  prevents jamming and helps handle fast or heavy-spin balls. The racket face must be stabilized
  and kept closed when the opponent's ball is fast. Looping backhand in a fast rally gets you
  jammed and that a rip, block, or quick counter-drive is more stable. Match errors to a soft
  hand, late timing, and stiffness in the body and grip. Additional points reinforce the same
  theme. Together, these principles show how the topic is applied in practice while preserving the
  relevant distinctions and constraints.
