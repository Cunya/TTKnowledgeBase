short_definition: When the opponent presses the backhand, the player must stabilize, adjust to the incoming shot, and avoid forcing power that will end in net errors.
evidence_summary: >-
  Backhand pressure management brings together several connected ideas. Pressure, lack of space,
  and net errors on the backhand. Long-ball difficulty against serves to pressure and large swings
  and standard downward spin handling create that pressure. Long balls struggle against serves
  because the player is under pressure, has not prepared properly, and needs a compact swing with
  forward brushing. The backhand example stresses not pulling back too much, not going too low,
  and staying below the ball without being too high. The receiver as tense and sluggish, then
  emphasizes keeping the body steady in backhand position. Lowering the center of gravity,
  creating room for extension and impact, keeping the arms close, and pausing in front of the body
  to avoid loss of power. Together, these principles show how the topic is applied in practice
  while preserving the relevant distinctions and constraints.
