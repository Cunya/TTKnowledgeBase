short_definition: Making a stable upward-curving ball path when receiving difficult spin or weak spin, rather than forcing a sharp or flat action.
evidence_summary: >-
  Create arc under pressure brings together several connected ideas. The trajectory should flatten
  after the bounce and that controlling the arc gives high consistency. To create or compress an
  arc when flicking, including against sidespin-topspin and half-spin/no-spin balls. The arc
  appears even when there is no spin, and later that adding friction gives both power and a proper
  arc. Creating or extending an arc, especially on low balls and spinning balls, as the key to
  avoiding errors. Against fast balls you should just create the arc and brush the ball, not add
  power. The player needs to create the arc themselves, linking the concept to ball clearance and
  the friction that brings the ball back down. Stabilizing the racket face and using the forearm
  to control the arc so the ball does not go out. Together, these principles show how the topic is
  applied in practice while preserving the relevant distinctions and constraints.
