short_definition: Making a stable upward-curving ball path when receiving difficult spin or weak spin, rather than forcing a sharp or flat action.
evidence_summary: >-
  Create arc under pressure brings together several connected ideas. The trajectory should flatten
  after the bounce and that controlling the arc gives high consistency. The arc appears even when
  there is no spin, and later that adding friction gives both power and a proper arc. Against fast
  balls you should just create the arc and brush the ball, not add power. Stabilizing the racket
  face and using the forearm to control the arc so the ball does not go out. Where the arc would
  come from if the swing is only a short forward drive and otherwise the ball is hit flat. Arc
  length/height control and the arc dictates the shot. The priority is to create a safe arc over
  the net, especially under pressure, before other adjustments matter. Fast or jamming balls
  should be brushed upward to create the arc needed to get the ball over the net. Additional
  points reinforce the same theme. Together, these principles show how the topic is applied in
  practice while preserving the relevant distinctions and constraints.
