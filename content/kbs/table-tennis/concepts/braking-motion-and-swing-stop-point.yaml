short_definition: The finish of the stroke must be controlled to match the incoming ball, stopping earlier or later depending on spin and bounce height to avoid going long or into the net.
evidence_summary: >-
  Braking motion and swing stop point brings together several connected ideas. How the swing
  ending point changes with ball quality, spin, and timing, including shortening or redirecting
  the arc. Modern strokes are compact with good braking motion and recommends shortening the
  stroke after contact. Side-topspin returns require stopping the motion early, and flicks should
  stop abruptly. An instantaneous stop, bracing the structure, and a compact finish with no drift.
  Braking as a core concept and the problem as failing to stop motion after contact. Braking as
  stopping the motion at the end of the swing and you must be able to stop the motion before using
  real power. The wrap is not an active motion but a braking mechanism after the forward drive,
  and that the motion should feel like a quick snap. Every motion must have a braking point and
  not to hold the ball on the racket. Additional points reinforce the same theme. Together, these
  principles show how the topic is applied in practice while preserving the relevant distinctions
  and constraints.
