short_definition: A looping and attacking principle where the player meets backspin by driving forward through contact instead of only lifting vertically.
evidence_summary: >-
  Forward drive against backspin brings together several connected ideas. Forward drive is
  required to connect with incoming spin and to make the stroke effective against both backspin
  and topspin. To stop swinging upward and instead drive forward after lifting the backspin. To
  move forward into the ball, not hit down, and to hit forward on the sinking return. Brushing
  alone is not enough and that the ball must be driven forward, toward the baseline, so the spin
  stays dangerous after the bounce. A useful contrast is between useless upward brushing and
  brushing in place and the correct action of driving forward into the ball, engaging it firmly,
  then brushing through contact. The stroke must have forward momentum, pushes should be guided
  forward, and every shot must have a forward component. Together, these principles show how the
  topic is applied in practice while preserving the relevant distinctions and constraints.
