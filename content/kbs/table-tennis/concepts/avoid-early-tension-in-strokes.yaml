  the cause of stiff snap and poor brushing feel. Rushing to hit with the arm causes problems and
  advises pausing instead of rushing into the stroke. The backswing should stay relaxed and that
  power is applied only at the start of the forward swing. The common mistake is a forceful
  backswing, applying excessive force too early, and a tense backswing. Unstable strokes come from
  generating power too early and recommends a relaxed backswing with explosive release later. The
  error as being tense on the backswing and relaxed at impact, which reverses the desired pattern.
  Early tension as a main problem and the hand should stay relaxed during preparation and at
  contact. Trying too hard to generate power makes the hand tense up and to relax a bit instead.
  Additional points reinforce the same theme. Together, these principles show how the topic is
  applied in practice while preserving the relevant distinctions and constraints.
