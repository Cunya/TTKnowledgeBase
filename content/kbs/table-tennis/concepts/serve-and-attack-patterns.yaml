id: concept-serve-and-attack-patterns
slug: serve-and-attack-patterns
label: Serve-and-attack patterns
aliases:
  - serve and attack sequence
  - spin-spin-kill pattern
short_definition: Plan the serve, expected return, opening attack, and finishing ball as one connected point pattern.
evidence_summary: >-
  Serve and attack should be treated as one connected sequence, where the first ball is designed
  to set up the next two balls rather than end the exchange by itself. A classic pattern is a
  heavy-spin serve, a heavy-spin third-ball attack, and a power fifth-ball finish, and this
  sequence is important enough to memorize. The serve must be spinny enough to force a weak
  return, and the first attack should be decisive and aimed at winning the point rather than
  merely continuing the rally.
evidence_summary_source_hash: "sha256:4154a340bd080e87a0051492ab004d2978ed54eb753468418e1ce665f578642b"
