  bringing the hand back, and that on slow spinny loops you should close the racket angle. A
  consistent 2 o'clock racket angle, explains that closing the racket too much causes edge hits,
  and stresses that the face should stay stable through contact and follow-through. To open the
  racket face and keep the racket vertical when handling long-pips returns. Additional points
  reinforce the same theme. Together, these principles show how the topic is applied in practice
  while preserving the relevant distinctions and constraints.
