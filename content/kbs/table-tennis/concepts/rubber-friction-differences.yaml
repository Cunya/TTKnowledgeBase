id: concept-rubber-friction-differences
slug: rubber-friction-differences
label: Rubber friction differences
aliases:
  - tacky versus grippy rubber
short_definition: Adjust brushing pressure and acceleration to how the rubber grips the ball rather than assuming every surface produces friction identically.
evidence_summary: >-
  Different rubbers produce different amounts of usable friction, with tacky and grippy surfaces
  making it easier to brush the ball effectively and generate stronger looping power. The quality
  of contact also depends on where the ball meets the rubber, because contact on the upper half
  creates more real friction and more useful spin and arc than lower-half contact. In practice,
  the rubber type and the exact contact point together shape how much spin can be created.
