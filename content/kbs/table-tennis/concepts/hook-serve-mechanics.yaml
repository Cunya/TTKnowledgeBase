id: concept-hook-serve-mechanics
slug: hook-serve-mechanics
label: Hook serve mechanics
aliases: [hook serve, hooked wrist serve]
short_definition: Use a hooked racket action, forward force, and forearm extension to produce sidespin–topspin or sidespin–backspin.
evidence_summary: >-
  The hook serve is a spin-heavy serve built around a curved racket path that goes down first and
  then up, increasing the brushing time on the ball. Its power does not come from wrist action
  alone but from coordinated looseness, finger lead, shoulder and elbow drop, and fast
  acceleration through contact, which helps create deception and floating spin. The serve is
  mechanically different from a left sidespin-backspin serve because the racket path and spin
  direction are shaped by the hook-like motion rather than a more direct side-spinning action.
evidence_summary_source_hash: "sha256:5622a3207474e4edab18827d58e422e218d9719c4188b5d27fcee98f38a58372"
evidence_summary_generator: "codex"
concept_type: serve-mechanic
facets: {category: [stroke], side: [neutral], spin: [sidespin, topspin, backspin], level: [intermediate]}
difficulty: intermediate
review_status: approved
