id: concept-body-height-adjustment
slug: body-height-adjustment
label: Body-height adjustment
aliases:
  - stable stroke height
  - lower to the ball
short_definition: Adjust the legs and body height to the incoming ball while keeping the stroke structure stable through transitions.
evidence_summary: >-
  Body height must change according to the incoming ball so the racket and torso stay in the right
  position for contact. Players need to lower their center of gravity for spinny, low, or heavy
  backspin balls, often staying in a squat or lunge longer instead of rising too early. Against
  flatter balls, the stance can stay more level, but the body still has to remain behind the ball
  and match its height.
evidence_summary_source_hash: "sha256:ad8c4b715a133f9ca093256802a635aca3cb2e9074d7828cacc471d315936f0f"
evidence_summary_generator: "codex"
