id: concept-active-block
slug: active-block
label: Active block
aliases:
  - punch block
  - firm block
short_definition: Turn a passive block into a controlled counter by stabilizing the grip and adding compact forearm movement.
evidence_summary: >-
  An active block is a pressing defensive action that makes the return more threatening by sending
  the forearm forward through the racket path instead of simply absorbing the ball. The same
  motion applies on both forehand and backhand, with the key being forearm displacement over about
  one racket length and a firm grip when facing heavy spin. A soft grip can leave the block long,
  while a tighter, controlled contact can add quality and, when needed, turn the block into a
  punch-block for an early, finishing return.
evidence_summary_source_hash: "sha256:71e435df7fafd8a1ed78dc0c9c4cb3d1c64a7eefde91c022504a49690e617980"
