id: concept-brush-around-the-ball
slug: brush-around-the-ball
label: Brush around the ball
aliases: [brushing the ball curvature, wrapping around the ball, curved brushing path]
short_definition: Create friction by moving the racket along the ball's curved surface instead of pushing or lifting in a straight line.
evidence_summary: >-
  Brushing around the ball creates spin by moving across its curved surface instead of striking it
  straight on. A thinner, more glancing contact increases friction, and wrist and finger action
  help the racket travel in a curved path that produces more arc and rotation. The more the stroke
  emphasizes brushing over hitting, the more spin and curve the ball will have.
evidence_summary_source_hash: "sha256:a39bbca51022f435a4c76d3e61c8130323bcf79bf10120553acbf797223a8c8e"
evidence_summary_generator: "codex"
detailed_definition: The initial touch begins a short curved path across the ball. Fingers can lead the wrist and arm through that path, allowing the racket head to accelerate while maintaining tangential contact. The principle applies beyond one grip or stroke side.
concept_type: contact-mechanic
facets: {category: [stroke, fundamentals], side: [neutral], spin: [topspin], level: [intermediate]}
difficulty: intermediate
review_status: approved
