id: concept-brush-around-the-ball
slug: brush-around-the-ball
label: Brush around the ball
aliases: [brushing the ball curvature, wrapping around the ball, curved brushing
      path]
short_definition: Create friction by moving the racket along the ball's curved
  surface instead of pushing or lifting in a straight line.
detailed_definition: The initial touch begins a short curved path across the
  ball. Fingers can lead the wrist and arm through that path, allowing the
  racket head to accelerate while maintaining tangential contact. The principle
  applies beyond one grip or stroke side.
concept_type: contact-mechanic
facets: {category: [stroke, fundamentals], side: [neutral], spin: [topspin],
    level: [intermediate]}
difficulty: intermediate
