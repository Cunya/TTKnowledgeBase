short_definition: When transitioning to the forehand, pivot and open the body so the arm has space to swing forward instead of getting trapped or forced upward.
evidence_summary: >-
  Open shoulder and pivot for forehand transition brings together several connected ideas. To open
  the shoulder, rotate the torso, pivot slightly, and create space for forehand contact and power.
  A forehand pivot where both feet move together, the right foot rotates the body, and the
  shoulders open before looping. A closed forearm as the problem and the solution is to open the
  forearm while keeping shoulder and elbow stable. After the serve the shoulders should stay open,
  with the right shoulder back and left shoulder forward, so the player can rotate for backhand or
  step in for forehand attacks. Together, these principles show how the topic is applied in
  practice while preserving the relevant distinctions and constraints.
