short_definition: Recognizing how much spin a received ball has so the receiver can choose an appropriate response.
evidence_summary: >-
  Reading spin for receive brings together several connected ideas. The learner on whether balls
  have spin and classifies them by spin amount. Receive as recognizing the spin and responding to
  neutralize it. Spin judgment/read the spin and evaluates correct and incorrect reads. To treat a
  return from backspin as topspin and a return from topspin as backspin, emphasizing spin reading.
  How the opponent reads spin and how that reduces the serve's threat. How reverse-spin, backhand
  serves, left sidespin, and hook serves change what receive choices are possible. To judge
  quickly after the ball lands, check distance and arc, and notes that many players cannot tell
  sidespin-topspin from sidespin-backspin when receiving serves. Viewers to read the spin and
  judge the ball based on the opponent's action and ball type. Additional points reinforce the
  same theme. Together, these principles show how the topic is applied in practice while
  preserving the relevant distinctions and constraints.
