evidence_summary: >-
  Reading spin for receive brings together several connected ideas. The learner on whether balls
  have spin and classifies them by spin amount. Heavy backspin, sidespin-topspin, half-spin, and
  no-spin as different receive situations. Serve receive around being unable to tell spin types
  apart and improving judgment of the incoming ball. Balls as semi-spin, says the spin is not
  neutralized, and failing to sense the spin as a core error. Reading trajectory and bounce rather
  than relying on the contact point, and the backswing motion can reveal spin type before contact.
  The main issue in receive as reading spin and judging it accurately. Identifying half-spin
  versus heavy spin and adjusting contact height accordingly, while noting beginners need
  technique because they lack wrist snap. The lesson as reading spin on a serve and gives multiple
  ways to judge it: contact, second bounce, and trajectory. Additional points reinforce the same
  theme. Together, these principles show how the topic is applied in practice while preserving the
  relevant distinctions and constraints.
