short_definition: Recognizing how much spin a received ball has so the receiver can choose an appropriate response.
evidence_summary: >-
  Reading spin for receive brings together several connected ideas. The learner on whether balls
  have spin and classifies them by spin amount. Spin judgment/read the spin and evaluates correct
  and incorrect reads. Heavy backspin, sidespin-topspin, half-spin, and no-spin as different
  receive situations. They mention fake loops and balls with no spin at all, which requires
  recognizing the incoming spin before choosing a response. Serve receive around being unable to
  tell spin types apart and improving judgment of the incoming ball. The key receive skill is
  judging spin, including when spin is unclear or deceptive, and contrasting topspin, backspin,
  and sidespin. Balls as semi-spin, says the spin is not neutralized, and failing to sense the
  spin as a core error. Receive success around identifying whether the ball is sidespin, backspin,
  or topspin, and calls misjudgment a major error. Additional points reinforce the same theme.
  Together, these principles show how the topic is applied in practice while preserving the
  relevant distinctions and constraints.
