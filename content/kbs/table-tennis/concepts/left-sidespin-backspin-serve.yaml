id: concept-left-sidespin-backspin-serve
slug: left-sidespin-backspin-serve
label: Left sidespin–backspin serve
aliases:
  - left sidespin underspin serve
short_definition: Combine lateral brushing with under-ball contact to produce a serve mixing left sidespin and backspin.
evidence_summary: >-
  The left sidespin-backspin serve is defined by a brushing action that combines strong side spin
  with backspin so the ball curves and floats after contact. The key mechanics are a dropped
  elbow, a braced upper arm, and a free wrist snap that lets the forearm stay quiet while the
  racket accelerates sharply through the ball. A common error is to drive the motion with the
  forearm instead of letting the wrist stay loose, since the serve depends on a localized snap
  that creates heavier spin and better control over the table.
evidence_summary_source_hash: "sha256:6cf2285472e9d260f988962af746ac7fc660faa0d2942339618ed653c9ab3a62"
evidence_summary_generator: "codex"
