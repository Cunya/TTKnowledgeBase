id: concept-efficient-footwork
slug: efficient-footwork
label: Efficient footwork
aliases:
  - economical movement
  - ball-seeking positioning
short_definition: Move only as much as the incoming ball requires, arriving balanced with usable spacing and weight direction.
evidence_summary: >-
  Efficient footwork is the foundation of stable technique because the feet create the contact
  environment before the hand acts. Good movement means adjusting distance, height, and weight
  shift so the body can find the ball and preserve balance at contact. When footwork is late or
  incomplete, the player loses space and control, so position has to be solved before stroke
  details can work properly.
evidence_summary_source_hash: "sha256:e068b54517f6db3aadd145092d84c76e28f662f6f9cf9f9f388a29aea9301881"
