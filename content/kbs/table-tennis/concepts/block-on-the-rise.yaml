id: concept-block-on-the-rise
slug: block-on-the-rise
label: Block on the rise
aliases:
  - early block timing
short_definition: Meet topspin early after the bounce to borrow pace and reduce the attacker's recovery time.
evidence_summary: >-
  A block is most reliable when the ball is taken early on the rise, before the spin and momentum
  fully develop. Early contact makes defense easier, keeps the player close to the table, and
  reduces the opponent’s ability to generate power. Waiting until the peak or downward phase
  usually makes the return harder to control.
