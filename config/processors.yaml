codex:
  default_model: gpt-5.4-mini
  reasoning_effort: low
  escalation_model: gpt-5.4
  escalation_reasoning_effort: low
  allow_automatic_escalation: false
  timeout_seconds: 300
  max_segments_per_job: 80
  overlap_segments: 8

# Local, per-knowledge-base daily token guard for all Codex-backed tasks.
# Adjust these values before a run; the private ledger is written under
# data/manifests/<kb>/llm-budget.json and resets by the configured date.
llm_budget:
  enabled: true
  timezone: Europe/Helsinki
  daily_token_limit: 30000000
  task_token_limits:
    extraction: 24000000
    rephrase: 2000000
    benchmark: 2000000
    summary: 8000000
  estimated_output_tokens:
    extraction: 8000
    rephrase: 1000
    benchmark: 8000
    summary: 1200
