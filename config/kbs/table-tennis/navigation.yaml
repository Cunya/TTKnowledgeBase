  description: The main actions used to serve, receive, attack, and rally.
  concept_ids:
  - concept-elbow-stabilization-through-support-points
  - concept-compact-stroke-under-fast-rallies
  children:
  - id: push
    label: Push
    description: Backspin control strokes used to keep the ball low, receive 
      serves, and prevent an easy attack.
