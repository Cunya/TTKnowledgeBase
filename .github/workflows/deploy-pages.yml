name: Publish website
run-name: "Publish website · ${{ github.event.head_commit.message || 'Manual deployment' }}"

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build deployment artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest
      - run: ruff check .
      - run: python -m processors.cli validate-published --kb table-tennis
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
        working-directory: app
      - run: npm run build
        working-directory: app
        env:
          SITE_URL: https://${{ github.repository_owner }}.github.io
      - name: Prevent private artifacts from entering the site
        shell: bash
        run: |
          if find app/dist -type f \( -iname '*.mp4' -o -iname '*.webm' -o -iname '*.mkv' -o -iname '*.mov' -o -iname '*.mp3' -o -iname '*.m4a' -o -iname '*.opus' -o -iname '*.wav' -o -iname '*.events.jsonl' -o -iname '*.response.json' -o -iname 'cookies*.txt' -o -iname '.env*' \) | grep -q .; then
            echo "Private/media artifact found in Pages output"
            exit 1
          fi
          if grep -R '"segments"[[:space:]]*:' app/dist; then
            echo "Raw transcript segments found in Pages output"
            exit 1
          fi
          if grep -R -E '(YTKB_WEBSHARE_PASSWORD|BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY|sk-[A-Za-z0-9_-]{20,})' app/dist; then
            echo "Credential-like material found in Pages output"
            exit 1
          fi
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist
  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
